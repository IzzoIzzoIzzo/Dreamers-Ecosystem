const ACHS=[{id:'f10',n:'First Steps',d:'Climb floor 10',ic:'\ud83d\udeb6',c:{t:'floors',v:10}},{id:'pueblo',n:'Desert Dweller',d:'Clear Pueblo',ic:'\ud83c\udfdc',c:{t:'floors',v:80}},{id:'marsh',n:'Swamp Thing',d:'Clear Marsh',ic:'\ud83d\udc0a',c:{t:'floors',v:80}},{id:'city',n:'City Slicker',d:'Clear City',ic:'\ud83c\udfd9',c:{t:'floors',v:100}},{id:'lad100',n:'Ladder Lord',d:'100 ladders',ic:'\ud83e\ude9c',c:{t:'ladders',v:100}},{id:'em500',n:'Collector',d:'500 emeralds',ic:'\ud83d\udc8e',c:{t:'emeralds',v:500}},{id:'str50',n:'Streak Master',d:'50 combo',ic:'\ud83d\udd25',c:{t:'streak',v:50}},{id:'boss1',n:'Boss Slayer',d:'Defeat a boss',ic:'\ud83d\udc79',c:{t:'boss',v:1}},{id:'boss3',n:'Triple Threat',d:'All 3 bosses',ic:'\ud83c\udf1f',c:{t:'boss',v:3}}];

// ========== ENGINE ==========
const W=960,H=640,FH=22,SL=280,SW=400,MVF=28,SNAMES=['Front','Right','Back','Left'],AL=SL+15,AW=SW-30;
const GROUND_Y=H-40;
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function rand(a,b){return Math.random()*(b-a)+a}function pick(a){return a[Math.floor(Math.random()*a.length)]}function lerp(a,b,t){return a+(b-a)*t}
const STARS=[];for(let i=0;i<100;i++)STARS.push({x:Math.floor(Math.random()*960),y:Math.floor(Math.random()*400),sz:Math.random()<.7?1:2,off:Math.random()*Math.PI*2});

function mkPlayer(pr){return{x:.5,floor:0,side:0,facing:1,hp:5,maxHp:5,alive:true,invuln:0,shield:0,score:0,streak:0,emRun:0,ladder:pr.equipped.ladder,radio:pr.equipped.radio,shoes:pr.equipped.shoes,tool:pr.equipped.tool,onBossRoof:false,escaped:false,sTrans:0,sFrom:0,sTo:0,char:pr.character||'alex',atkCd:0,charging:false,chargeT:0,aimAngle:-Math.PI/2}}

// ========== MOVEMENT ==========
class MoveSys{
  constructor(g){this.g=g;this.mc=0}
  update(dt){
    const g=this.g,w=g.world,p=w.player;if(!p.alive||p.escaped)return;
    if(p.atkCd>0)p.atkCd-=dt;
    if(p.sTrans>0){p.sTrans-=dt*5;if(p.sTrans<=0){p.side=p.sTo;p.sTrans=0}return}
    this.mc-=dt;
    const sh=SHOES[p.shoes]||SHOES.Cloud,md=sh.eff==='fast'?.07:sh.eff==='float'?.13:.10;
    if(g.consumePress('KeyZ'))g.ladSys.place();
    if(g.consumePress('KeyX'))g.ladSys.removeNear();
    // Charging attack (hold space)
    if(g.isPressed('Space')&&w.bossActive){
      if(!p.charging){p.charging=true;p.chargeT=0}
      p.chargeT+=dt;
      // Aim with arrows during charge
      if(g.isPressed('ArrowLeft')||g.isPressed('KeyA'))p.aimAngle+=dt*3;
      if(g.isPressed('ArrowRight')||g.isPressed('KeyD'))p.aimAngle-=dt*3;
      if(g.isPressed('ArrowUp')||g.isPressed('KeyW'))p.aimAngle=lerp(p.aimAngle,-Math.PI/2,dt*5);
      return; // Don't move while charging
    }
    if(p.charging&&!g.isPressed('Space')){
      // Release charge — FIRE!
      g.bossSys.fireCharged(p.chargeT);
      p.charging=false;p.chargeT=0;
    }
    if(g.consumePress('Space')&&!w.bossActive){this.tryPaint();if(w.bossActive)g.bossSys.fireCharged(0);else this.climbAttack()}
    if(this.mc>0)return;
    let moved=false;
    if(!w.bossActive){
      if(g.isPressed('ArrowLeft')||g.isPressed('KeyA')){p.x-=.12;p.facing=-1;if(p.x<.06){p.sFrom=p.side;p.sTo=(p.side-1+4)%4;p.sTrans=1;p.x=.94;moved=true}}
      if(g.isPressed('ArrowRight')||g.isPressed('KeyD')){p.x+=.12;p.facing=1;if(p.x>.94){p.sFrom=p.side;p.sTo=(p.side+1)%4;p.sTrans=1;p.x=.06;moved=true}}
      p.x=clamp(p.x,.06,.94);
      if(g.isPressed('ArrowUp')||g.isPressed('KeyW')){
        if(g.ladSys.canClimb(1)){
          let step=p.ladder==='Spring'?2:1;const nf=p.floor+step;
          if(nf>=g.curMap.floors&&!w.bossActive){w.bossActive=true;p.onBossRoof=true;p.floor=g.curMap.floors;p.x=.5;p.aimAngle=-Math.PI/2}
          else{if(nf>=w.building.floors-1){w.building.floors=nf+MVF;for(let s=0;s<4;s++){const base=w.sideData[s].windows.length;for(let f=0;f<MVF;f++)w.sideData[s].windows.push({floor:base+f,xSlot:Math.floor(rand(0,3)),open:Math.random()<.7,openTimer:rand(2,8)})}}p.floor=nf}
          moved=true;g.strkSys.onClimb();g.addScore(10*step)}}
      if(g.isPressed('ArrowDown')||g.isPressed('KeyS')){if(g.ladSys.canClimb(-1)){p.floor=Math.max(0,p.floor-1);moved=true}}
    } else {
      // Boss arena — walk left/right on rooftop
      if(g.isPressed('ArrowLeft')||g.isPressed('KeyA')){p.x-=.05;p.facing=-1;moved=true}
      if(g.isPressed('ArrowRight')||g.isPressed('KeyD')){p.x+=.05;p.facing=1;moved=true}
      p.x=clamp(p.x,.02,.98);
      // Attack while on boss roof
      if(g.consumePress('Space')){g.bossSys.fireCharged(0)}
      // Aim with up/down
      p.x=clamp(p.x,.02,.98);
      // Aim with up/down
      if(g.isPressed('ArrowUp')||g.isPressed('KeyW'))p.aimAngle-=dt*2.5;
      if(g.isPressed('ArrowDown')||g.isPressed('KeyS'))p.aimAngle+=dt*2.5;
      p.aimAngle=clamp(p.aimAngle,-Math.PI,0);
    }
    if(moved)this.mc=md;
  }
  tryPaint(){const g=this.g,p=g.world.player;if(p.tool!=='Paintbrush')return;const ex=g.world.effects.find(e=>e.type==='paint'&&e.side===p.side&&e.floor===p.floor);if(ex)return;g.world.effects.push({type:'paint',side:p.side,floor:p.floor,duration:10});g.addScore(15);for(let i=0;i<8;i++)g.addPart(g.getPX(),g.getPY(),'#ff5cf4',.45,2,(Math.random()-.5)*30,-20-Math.random()*20)}
  climbAttack(){const g=this.g,p=g.world.player;if(p.atkCd>0)return;const px=g.getPX(),py=g.getPY();const speed=220,angle=p.facing>0?0:Math.PI;
    // Tool attack - only if has tool (not Paintbrush) - upgraded attack with PULSE
    if(p.tool&&p.tool!=='Paintbrush'){
      g.bossSys.pProj.push({x:px,y:py,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1.5,dmg:2,color:'#ff5cf4',type:'tool'});
      g.addScore(20)}
    // Crown attack - BASE attack, always works without upgrades with SPARK
    else{
      g.bossSys.pProj.push({x:px,y:py,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1.5,dmg:1,color:'#ffd84d',type:'crown'});
      g.addScore(10)}
    p.atkCd=.35;for(let i=0;i<5;i++)g.addPart(px,py,'#ffd84d',.3,3,rand(-15,15),rand(-15,5))}
}

// ========== LADDERS ==========
class LadSys{
  constructor(g){this.g=g}
  update(dt){const w=this.g.world;for(const l of w.ladders){if(!l.destroyed&&(l.type==='Quantum'||l.type==='Ghost'))l.phase+=dt*3}for(const e of w.effects){if(e.duration!=null)e.duration-=dt}w.effects=w.effects.filter(e=>e.duration==null||e.duration>0);for(const l of w.ladders){if(l.destroyed)l.fade=(l.fade||1)-dt*1.4}w.ladders=w.ladders.filter(l=>!l.destroyed||(l.fade||0)>0);
    // Window open/close cycle
    for(const sd of w.sideData)for(const win of sd.windows){win.openTimer-=dt;if(win.openTimer<=0){win.open=!win.open;win.openTimer=rand(win.open?3:1.5,win.open?8:4)}}}
  place(){const g=this.g,w=g.world,p=w.player;if(w.ladders.find(l=>l.side===p.side&&l.floor===p.floor&&Math.abs(l.x-p.x)<.08&&!l.destroyed))return;const hp={Basic:1,Steel:3,Magnetic:4,Spring:2,Quantum:2,Plasma:3,Crystal:3,Ghost:1,Vine:5};w.ladders.push({side:p.side,floor:p.floor,x:p.x,type:p.ladder,hp:hp[p.ladder]||1,maxHp:hp[p.ladder]||1,destroyed:false,phase:0,fade:1});g.addScore(5);g.profile.stats.laddersPlaced++;for(let i=0;i<4;i++)g.addPart(g.getPX(),g.getPY(),'#ffd84d',.25,2,(Math.random()-.5)*20,-10-Math.random()*10)}
  removeNear(){const w=this.g.world,p=w.player;let best=null,bd=Infinity;for(const l of w.ladders){if(l.side!==p.side||l.destroyed)continue;const d=Math.abs(l.floor-p.floor)+Math.abs(l.x-p.x);if(d<bd){bd=d;best=l}}if(best&&bd<.25)best.destroyed=true}
  canClimb(dir){const w=this.g.world,p=w.player;if(p.floor+dir<0)return false;
    // Only block if directly at a closed window - check x position
    if(dir>0){const sd=w.sideData[p.side],win=sd.windows.find(wi=>wi.floor===p.floor&&!wi.open);if(win){const wx=SL+25+win.xSlot*(SW/4),px=this.g.getPX();if(Math.abs(wx-px)<15)return false}}
    const paints=w.effects.filter(e=>e.type==='paint'&&e.side===p.side&&e.floor===p.floor);const lad=w.ladders.find(l=>l.side===p.side&&l.floor===p.floor&&!l.destroyed&&Math.abs(l.x-p.x)<(paints.length>0?.14:.1));if(lad)return true;const sh=SHOES[p.shoes]||{};if((sh.eff==='grip'||sh.eff==='ghost')&&dir>0&&Math.random()<.18)return true;return false}
  dmgAt(side,floor,x){const w=this.g.world;const l=w.ladders.find(l=>l.side===side&&l.floor===floor&&!l.destroyed&&Math.abs(l.x-x)<.08);if(!l)return;if(w.player.radio==='Zen'&&Math.random()<.3)return;l.hp--;if(l.hp<=0)l.destroyed=true}
}

// ========== FALLING OBJECTS ==========
class FallSys{
  constructor(g){this.g=g;this.st=.8}
  update(dt){const g=this.g,w=g.world,p=w.player;if(w.bossActive)return;let rm=1;if(p.radio==='LoFi')rm=1.35;if(p.radio==='Chaos')rm=.72;if(p.radio==='Float')rm=1.55;if(p.radio==='Cosmic')rm=1.8;this.st-=dt;if(this.st<=0&&!p.escaped){this.spawn();this.st=Math.max(.15,.9-Math.min(p.floor/100,2)*.3)*rm}
    const slow=g.strkSys.hasSlow();
    for(const o of w.fallObj){let sm=slow?.6:1;if(p.radio==='Float'||(SHOES[p.shoes]||{}).eff==='float')sm*=.72;o.y+=o.vy*dt*sm;
      if(p.radio==='Bass')o.x+=Math.sin(g.elapsed*8+o.seed)*16*dt;
      for(const l of w.ladders){if(l.side!==o.side||l.destroyed)continue;const lx=AL+l.x*AW;const lt=g.getFloorY(l.floor+1)+8,lb=g.getFloorY(l.floor)+8;if(o.x>lx-10&&o.x<lx+10&&o.y>lt&&o.y<lb){g.ladSys.dmgAt(l.side,l.floor,l.x);o.dead=true;g.shake=2;break}}
      if(o.side===p.side){const px=g.getPX(),py=g.getPY();if(o.x>px-10&&o.x<px+10&&o.y>py-18&&o.y<py+10){const sh=SHOES[p.shoes]||{};if(!((sh.eff==='phase'||sh.eff==='ghost')&&Math.random()<.3))g.dmgPlayer(1,'hazard');o.dead=true}}
      if(o.y>H+20)o.dead=true}
    w.fallObj=w.fallObj.filter(o=>!o.dead)}
  spawn(){const w=this.g.world,side=Math.floor(Math.random()*4),x=AL+30+Math.random()*(AW-60);const r=Math.random();let k='brick';if(r>.25)k='crate';if(r>.5)k='glass';if(r>.8)k='tv';const sz={brick:[14,10,120],crate:[18,18,100],glass:[12,20,135],tv:[20,16,110]};const[w0,h0,vy]=sz[k];
    w.fallObj.push({side,x,y:-20,w:w0,h:h0,vy:vy*(1+w.player.floor/150*.3),kind:k,seed:Math.random()*1000})}
}

// ========== ENEMIES ==========
class EnemySys{
  constructor(g){this.g=g}
  update(dt){const g=this.g,w=g.world,p=w.player;if(w.bossActive)return;const et=g.curMap.enemyType;const tc=Math.min(8,1+Math.floor(Math.max(0,p.floor-5)/12));
    while(w.enemies.length<tc){const ef=Math.floor(rand(2,p.floor+5)),es=Math.floor(rand(0,4));if(!w.enemies.find(e=>e.side===es&&Math.abs(e.floor-ef)<2)){
      // Cowboys only at ground floors (0-5)
      const fl=et==='cowboy'?Math.floor(rand(0,6)):ef;
      w.enemies.push({side:es,floor:fl,x:rand(.2,.8),dir:Math.random()<.5?-1:1,timer:rand(0,2),cd:rand(1.5,3),et,af:0})}else break}
    for(let i=w.enemies.length-1;i>=0;i--){const e=w.enemies[i];if(Math.abs(e.floor-p.floor)>14){w.enemies.splice(i,1);continue}
      e.timer+=dt;e.af=Math.floor(e.timer*6)%4;
      if(e.et==='cowboy'){e.x+=e.dir*dt*.05;if(e.x<.12){e.x=.12;e.dir=1}if(e.x>.88){e.x=.88;e.dir=-1}e.cd-=dt;if(e.cd<=0){e.cd=rand(2.5,4);if(Math.abs(e.floor-p.floor)<=3&&e.side===p.side)w.fallObj.push({side:e.side,x:AL+e.x*AW,y:g.getFloorY(e.floor),w:10,h:10,vy:120,kind:'glass',seed:Math.random()*1000})}if(Math.abs(e.floor-p.floor)<=1&&e.side===p.side&&Math.abs(e.x-p.x)<.12)g.dmgPlayer(1,'enemy')}
      else if(e.et==='monkey'){e.x+=e.dir*dt*.15;if(e.x<.08){e.x=.08;e.dir=1}if(e.x>.92){e.x=.92;e.dir=-1}e.cd-=dt;if(e.cd<=0){e.cd=rand(1.2,2.5);if(Math.random()<.4)e.floor=Math.max(0,e.floor+(Math.random()<.5?1:-1));if(Math.abs(e.floor-p.floor)<=1&&e.side===p.side&&Math.abs(e.x-p.x)<.15)g.dmgPlayer(1,'enemy')}}
      else if(e.et==='drone'){e.x+=e.dir*dt*.2;if(e.x>1.1){e.x=-.1;e.floor=Math.max(0,p.floor+Math.floor(rand(-3,3)));e.side=Math.floor(rand(0,4))}if(e.x<-.1){e.x=1.1;e.dir=1}e.cd-=dt;if(e.cd<=0){e.cd=rand(2,3.5);if(Math.abs(e.floor-p.floor)<=2&&e.side===p.side)w.fallObj.push({side:e.side,x:AL+e.x*AW,y:g.getFloorY(e.floor),w:12,h:12,vy:140,kind:'tv',seed:Math.random()*1000})}if(Math.abs(e.floor-p.floor)<=1&&e.side===p.side&&Math.abs(e.x-p.x)<.12)g.dmgPlayer(1,'enemy')}
    }
  }
}

// ========== BOSS SYSTEM (Charged Attacks + Aim Line) ==========
class BossSys{
  constructor(g){this.g=g;this.boss=null;this.at=2;this.proj=[];this.pProj=[];this.shardT=0;this.shards=[];this.hitFx=[]}
  ensureBoss(){if(this.boss)return;const m=this.g.curMap;let hp=30;if(m.boss==='lochness')hp=35;if(m.boss==='hawk')hp=25;this.boss={type:m.boss,hp,maxHp:hp,active:false,x:480,y:80,phase:0,swoopY:80,neckAng:0,hitFlash:0}}
  update(dt){this.ensureBoss();const g=this.g,w=g.world,p=w.player;this.boss.active=!!w.bossActive&&!w.bossDefeated;if(this.boss.hitFlash>0)this.boss.hitFlash-=dt;
    // Hit FX animation
    this.hitFx=this.hitFx.filter(h=>{h.t+=dt;return h.t<.4});
    if(!this.boss.active)return;
    const b=this.boss;b.phase+=dt;this.at-=dt;this.shardT-=dt;
    if(this.shardT<=0){this.shardT=rand(2,4);this.shards.push({x:AL+rand(40,AW-40),y:rand(180,480),col:false,bob:rand(0,6.28)})}
    for(const s of this.shards){s.bob+=dt*4;const px=g.getPX(),py=g.getPY();if(!s.col&&Math.abs(s.x-px)<20&&Math.abs(s.y-py)<20){s.col=true;g.addScore(30);g.addEm(2);for(let i=0;i<8;i++)g.addPart(s.x,s.y,'#14d27a',.5,3,rand(-30,30),rand(-30,10))}}
    this.shards=this.shards.filter(s=>!s.col);
    // Boss AI
    if(b.type==='witch'){b.x=480+Math.sin(b.phase*1)*200;b.y=80+Math.sin(b.phase*.7)*50;if(this.at<=0){this.at=Math.max(.7,2.2-b.phase*.01);this.proj.push({x:b.x,y:b.y+40,vx:(g.getPX()-b.x)*.25,vy:100,type:'spell',life:3.5});for(let i=0;i<4;i++)g.addPart(b.x,b.y+30,'#b14cff',.3,2,rand(-20,20),rand(5,20))}}
    if(b.type==='lochness'){b.neckAng=Math.sin(b.phase*.5)*.9;b.x=SL-50;b.swoopY=180+Math.sin(b.phase*.35)*90;if(this.at<=0){this.at=rand(1.5,2.8);for(let i=0;i<3;i++)this.proj.push({x:SL+20,y:b.swoopY+i*35,vx:180,vy:rand(-15,15),type:'acid',life:2.5});if(Math.random()<.4){const px=g.getPX(),py=g.getPY();this.proj.push({x:SL+40,y:b.swoopY,vx:(px-SL)*.3,vy:(py-b.swoopY)*.3,type:'acid',life:3})}g.shake=6}}
    if(b.type==='hawk'){b.x=480+Math.sin(b.phase*1.8)*260;b.y=50+Math.abs(Math.sin(b.phase*.45))*120;if(this.at<=0){this.at=Math.max(.5,1.6-b.phase*.008);this.proj.push({x:b.x+rand(-20,20),y:b.y+30,vx:rand(-25,25),vy:130,type:'drop',life:3.5});if(Math.random()<.3)this.proj.push({x:b.x,y:b.y,vx:(g.getPX()-b.x)*.45,vy:70,type:'swoop',life:2})}}
    // Update boss projectiles
    for(const pr of this.proj){pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;const px=g.getPX(),py=g.getPY();if(Math.abs(pr.x-px)<16&&Math.abs(pr.y-py)<16){g.dmgPlayer(1,'boss');pr.life=0}}
    this.proj=this.proj.filter(p=>p.life>0&&p.y<H+30&&p.x>-30&&p.x<W+30);
    // Update player projectiles
    for(const pp of this.pProj){pp.x+=pp.vx*dt;pp.y+=pp.vy*dt;pp.life-=dt;const bx=b.x,by=b.type==='lochness'?b.swoopY:b.y;if(Math.abs(pp.x-bx)<35&&Math.abs(pp.y-by)<35){b.hp-=pp.dmg;b.hitFlash=.2;g.addScore(40*pp.dmg);g.shake=4;this.hitFx.push({x:pp.x,y:pp.y,t:0,color:pp.color});for(let i=0;i<6;i++)g.addPart(bx,by,pp.color||'#ffd84d',.4,3,rand(-40,40),rand(-30,10));pp.life=0}}
    this.pProj=this.pProj.filter(p=>p.life>0&&p.y>-30&&p.x>-30&&p.x<W+30);
    if(b.hp<=0&&!w.bossDefeated){w.bossDefeated=true;g.addScore(500);g.addEm(25);g.profile.stats.bossesDefeated++;for(let i=0;i<40;i++)g.addPart(480,100,'#ffd84d',.8,4,rand(-80,80),rand(-80,-20));g.triggerVictory()}}

  fireCharged(chargeT){
    const g=this.g,p=g.world.player;if(!this.boss||!this.boss.active||p.side!==0)return;if(p.atkCd>0)return;
    const px=g.getPX(),py=g.getPY(),tool=TOOLS[p.tool]||TOOLS.Paintbrush;
    const charge=Math.min(chargeT||0,2);// Max 2s charge
    const dmg=charge>.5?Math.floor(1+charge*2):1;
    const speed=250+charge*100;
    const angle=p.aimAngle;
    const colors={projectile:'#ffd84d',beam:'#8efcff',hook:'#14d27a',pulse:'#ff5cf4',shield:'#5dc7ff',magnet:'#14d27a',melee:'#ff5cf4'};
    const col=colors[tool.at]||'#ffd84d';
    if(tool.at==='pulse'){
      // Area blast
      const bx=this.boss.x,by=this.boss.type==='lochness'?this.boss.swoopY:this.boss.y;

    if(!p.alive){this.world.gameOverTimer-=dt;if(this.world.gameOverTimer<=0)this.showGO()}
    this.hud.update();this.resetInput()}

  render(){const ctx=this.ctx;ctx.imageSmoothingEnabled=false;ctx.clearRect(0,0,this.width,this.height);const sx=this.settings.shake?rand(-this.shake,this.shake):0,sy=this.settings.shake?rand(-this.shake,this.shake):0;ctx.save();ctx.translate(Math.floor(sx),Math.floor(sy));this.drawBg(ctx);if(this.world){if(!this.world.bossActive){this.drawGround(ctx);this.drawBuilding(ctx);this.drawWindows(ctx);this.drawLadders(ctx);this.drawEnemies(ctx);this.drawFallObj(ctx);this.drawColl(ctx);this.drawCars(ctx)}else{this.drawBossArena(ctx)}if(this.bossSys)this.bossSys.drawBoss(ctx);this.drawPlayer(ctx);if(this.bossSys)this.bossSys.drawAimLine(ctx);this.drawParts(ctx);this.drawFG(ctx)}ctx.restore();if(this.flash>0){ctx.save();ctx.globalAlpha=this.flash*.7;ctx.fillStyle='#fff';ctx.fillRect(0,0,this.width,this.height);ctx.restore()}}

  drawBg(ctx){const m=this.curMap;
    // Map-specific backgrounds
    if(m.name==='City'){DSF(ctx,SP.citySky,0,0,W,300,'#050510');DSF(ctx,SP.cityBg,0,200,W,280,'#101020')}
    else if(m.name==='Marsh'){
      // Night sky layers
      DSF(ctx,SP.marshBg1,0,0,W,H,'#0d1a05');
      ctx.globalAlpha=.5;DSF(ctx,SP.marshBg2,0,0,W,H,'transparent');ctx.globalAlpha=.3;DSF(ctx,SP.marshBg3,0,50,W,H-50,'transparent');ctx.globalAlpha=1;
      // Trees in background
      for(let i=0;i<6;i++){const tr=SP.trees[i%4];const tx=30+i*160,ty=H-200-Math.sin(i*1.3)*40;DSF(ctx,tr,tx,ty,80,120,'#1a3a12')}
      // Leaves
      for(let i=0;i<6;i++){const lf=SP.leaves[i%SP.leaves.length];if(lf&&lf._l)ctx.drawImage(lf,50+i*150+Math.sin(this.elapsed+i)*5,80+i*30,30,30)}
    } else {
      const grad=ctx.createLinearGradient(0,0,0,this.height);grad.addColorStop(0,m.skyTop);grad.addColorStop(1,m.skyBottom);ctx.fillStyle=grad;ctx.fillRect(0,0,this.width,this.height)}
    for(const s of STARS){ctx.globalAlpha=.4+Math.sin(this.elapsed*2+s.off)*.4;ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.sz,s.sz)}ctx.globalAlpha=1;
    // Marsh lake
    if(m.hasLake){const ly=H-60;ctx.fillStyle='rgba(20,60,120,.5)';ctx.fillRect(0,ly-20,SL-20,80);for(let i=0;i<15;i++){const wx=i*20,wy=ly-18+Math.sin(this.elapsed*1.5+i*.7)*3;ctx.fillStyle='rgba(72,198,255,.4)';ctx.fillRect(wx,wy,14,3);ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(wx+2,wy-2,8,1)}ctx.fillStyle='#3d8a2d';for(let i=0;i<4;i++){const lx=30+i*55+Math.sin(this.elapsed*.5+i)*8,lpy=ly+5+Math.sin(this.elapsed*.8+i*1.5)*3;ctx.beginPath();ctx.ellipse(lx,lpy,12,7,0,0,Math.PI*2);ctx.fill()}}
    // Ambient birds
    if(this.world)for(const b of this.world.ambBirds){if(!DSFRAME(ctx,SP.bird1Walk,Math.floor(this.elapsed*6)%4,48,48,b.x,b.y,24,24,b.vx<0)){ctx.fillStyle='#5a4030';ctx.fillRect(b.x-4,b.y,8,4);const wy=Math.sin(this.elapsed*10+b.x)*3;ctx.fillRect(b.x-8,b.y-2+wy,6,3);ctx.fillRect(b.x+2,b.y-2-wy,6,3)}}
    const gl=ctx.createRadialGradient(480,300,0,480,300,350);gl.addColorStop(0,'rgba(91,63,209,.06)');gl.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gl;ctx.fillRect(0,0,W,H)}

  drawGround(ctx){const m=this.curMap,gy=this.height-40;
    ctx.fillStyle=m.groundColor;ctx.fillRect(0,gy,this.width,40);
    for(let x=0;x<this.width;x+=4){ctx.fillStyle=m.groundAccent;ctx.fillRect(x,gy,2,2+Math.sin(x*.1)*2)}
    if(m.name==='Marsh'){for(let i=0;i<20;i++){const bs=SP.bushes[i%SP.bushes.length];const bx=i*50+10;DSF(ctx,bs,bx,gy-18,28,24,'#2a5a1a')}for(let i=0;i<30;i++){const gs=SP.grass[i%SP.grass.length];DSF(ctx,gs,i*34,gy-10,20,14,'#4a7a38')}
      // Stones
      for(let i=0;i<3;i++){const st=SP.stones[i%SP.stones.length];DSF(ctx,st,200+i*250,gy-14,24,18,'#666')}}
    if(m.name==='City'){ctx.fillStyle='#3a3a3a';ctx.fillRect(0,gy+5,this.width,2);for(let x=0;x<this.width;x+=40){ctx.fillStyle='#ffd84d';ctx.fillRect(x,gy+15,20,3)}ctx.fillStyle='#5a5a5a';ctx.fillRect(0,gy+25,this.width,2)}
    if(m.name==='Pueblo'){for(let i=0;i<6;i++){const cx=40+i*160;ctx.fillStyle='#5a8a3a';ctx.fillRect(cx,gy-20,6,22);ctx.fillRect(cx-8,gy-14,6,4);ctx.fillRect(cx+6,gy-10,6,4);ctx.fillRect(cx-8,gy-14,4,10);ctx.fillRect(cx+8,gy-10,4,8)}}}

  drawBuilding(ctx){const m=this.curMap,w=this.world,p=w.player;const top=Math.min(w.building.floors,p.floor+MVF),bot=Math.max(0,p.floor-6);
    for(let f=bot;f<top;f++){const fy=this.getFloorY(f);if(fy>this.height+30||fy<-30)continue;ctx.fillStyle=f%2===0?m.bPrimary:m.bSecondary;ctx.fillRect(SL,fy,SW,FH);ctx.fillStyle=m.bAccent;ctx.fillRect(SL,fy+FH-2,SW,2);ctx.fillRect(SL,fy,4,FH);ctx.fillRect(SL+SW-4,fy,4,FH)}
    // Tile overlay
    for(let f=bot;f<top;f+=3){const fy=this.getFloorY(f);if(fy>this.height+30||fy<-30)continue;const t=SP.tiles[f%SP.tiles.length];if(t&&t._l&&!t._f){ctx.globalAlpha=.12;ctx.drawImage(t,SL+6,fy,SW-12,FH);ctx.globalAlpha=1}}}

  drawBossArena(ctx){
    // Flat rooftop platform for boss fight
    const m=this.curMap,py=this.height-60;
    // Background stays from drawBg
    // Platform
    ctx.fillStyle=m.bPrimary;ctx.fillRect(SL-40,py,SW+80,20);ctx.fillStyle=m.bAccent;ctx.fillRect(SL-40,py,SW+80,3);ctx.fillStyle=m.bSecondary;ctx.fillRect(SL-40,py+18,SW+80,22);
    // Side pillars
    ctx.fillStyle=m.bAccent;ctx.fillRect(SL-40,py-40,8,60);ctx.fillRect(SL+SW+32,py-40,8,60);
    // Ground below
    ctx.fillStyle=m.groundColor;ctx.fillRect(0,this.height-20,W,20)}

  drawWindows(ctx){const w=this.world,m=this.curMap,sd=w.sideData[w.player.side];for(const win of sd.windows){const fy=this.getFloorY(win.floor);if(fy>this.height+10||fy<-10)continue;const wx=SL+25+win.xSlot*(SW/4);ctx.fillStyle=win.open?m.winColor:m.winOff;ctx.fillRect(wx,fy+3,18,14);if(win.open){ctx.fillStyle='rgba(255,216,77,.2)';ctx.fillRect(wx-3,fy+14,24,6)}}}

  drawLadders(ctx){const w=this.world,p=w.player;for(const l of w.ladders){if(l.side!==p.side)continue;const lx=AL+l.x*AW,ly1=this.getFloorY(l.floor+1)+4,ly2=this.getFloorY(l.floor)+4;if(ly2>this.height+20||ly1<-20)continue;ctx.globalAlpha=l.destroyed?Math.max(0,l.fade):1;const cols={Basic:'#d4a848',Steel:'#c0c8d8',Magnetic:'#14d27a',Spring:'#ff7ae7',Quantum:'#8efcff',Plasma:'#b14cff',Crystal:'#ffd84d',Ghost:'#8efcff',Vine:'#14d27a'};const col=cols[l.type]||'#d4a848';if(l.type==='Ghost'||l.type==='Quantum')ctx.globalAlpha*=.5+Math.sin(l.phase)*.3;
    // Try ladder sprite
    if(!DSF(ctx,SP.ladder1,lx-6,ly1,12,ly2-ly1,'transparent')){ctx.fillStyle=col;ctx.fillRect(lx-5,ly1,3,ly2-ly1);ctx.fillRect(lx+2,ly1,3,ly2-ly1);for(let r=0;r<3;r++){const ry=ly1+(ly2-ly1)*(r+.5)/3;ctx.fillRect(lx-4,ry,8,2)}}
    if(!l.destroyed&&l.hp<l.maxHp){ctx.fillStyle='#ff6b6b';ctx.fillRect(lx-5,ly1-4,10*(l.hp/l.maxHp),2)}ctx.globalAlpha=1}}

  drawEnemies(ctx){const w=this.world,p=w.player;for(const e of w.enemies){if(e.side!==p.side)continue;const ex=AL+e.x*AW,ey=this.getFloorY(e.floor)-4;if(ey>this.height+20||ey<-20)continue;
    if(e.et==='cowboy'){if(!DSFRAME(ctx,SP.cowboyIdle,e.af,48,48,ex-16,ey-28,32,32,e.dir<0)){ctx.fillStyle='#8b6914';ctx.fillRect(ex-6,ey-16,12,16);ctx.fillStyle='#c4a574';ctx.fillRect(ex-8,ey-22,16,8);ctx.fillStyle='#F4F8FF';ctx.fillRect(ex-4,ey-14,8,4)}}
    else if(e.et==='monkey'){ctx.fillStyle='#6a8a3a';ctx.fillRect(ex-6,ey-14,12,12);ctx.fillStyle='#8aaa4a';ctx.fillRect(ex-4,ey-10,8,6);ctx.fillStyle='#FFD84D';ctx.fillRect(ex-3,ey-12,2,2);ctx.fillRect(ex+1,ey-12,2,2);ctx.fillStyle='#6a8a3a';ctx.fillRect(ex+(e.dir>0?-8:6),ey-8,3,10);ctx.fillRect(ex-9+Math.sin(e.timer*8)*2,ey-8,3,6);ctx.fillRect(ex+6+Math.sin(e.timer*8+1)*2,ey-8,3,6)}
    else if(e.et==='drone'){if(!DSFRAME(ctx,SP.droneIdle,e.af%4,48,48,ex-16,ey-24,32,24,false)){ctx.fillStyle='#5a5a8a';ctx.fillRect(ex-12,ey-8,24,10);ctx.fillStyle='#ff4a4a';ctx.fillRect(ex-2,ey-12,4,4);const pw=8+Math.sin(this.elapsed*20)*4;ctx.fillStyle='#8a8aaa';ctx.fillRect(ex-pw,ey-10,pw*2,2)}}}}

  drawFallObj(ctx){const w=this.world,p=w.player;for(const o of w.fallObj){if(o.side!==p.side)continue;
    // Try meteor sprite for some
    if(o.kind==='crate'||o.kind==='brick'){DSF(ctx,SP.meteorSmall,o.x-o.w/2,o.y-o.h/2,o.w,o.h,'#888')}else if(o.kind==='tv'){DSF(ctx,SP.meteorTiny,o.x-o.w/2,o.y-o.h/2,o.w,o.h,'#3a3a4a')}else{ctx.fillStyle='#888';ctx.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h)}}}

  drawColl(ctx){const w=this.world,p=w.player;for(const c of w.collectibles){if(c.side!==p.side)continue;const cx=AL+c.x*AW,cy=c.y+Math.sin(c.bob)*3;
    if(c.type==='silver'){DSF(ctx,SP.citySilver,cx-10,cy-10,20,20,'#c0c8d8')}
    else if(c.type==='coin'){DSF(ctx,SP.moneySprite,cx-8,cy-8,16,16,'#ffd84d')}
    else if(c.type==='gem'){ctx.fillStyle='#5b3fd1';ctx.beginPath();ctx.moveTo(cx,cy-8);ctx.lineTo(cx+6,cy);ctx.lineTo(cx,cy+8);ctx.lineTo(cx-6,cy);ctx.closePath();ctx.fill();ctx.fillStyle='#8a7acc';ctx.beginPath();ctx.arc(cx-1,cy-2,2,0,Math.PI*2);ctx.fill()}
    else if(c.type==='star'){DSF(ctx,SP.puStarGold,cx-8,cy-8,16,16,'#ffd84d')}}}

  drawCars(ctx){const w=this.world;for(const car of w.cars){if(!car.active)continue;if(car.sprite&&car.sprite._l&&!car.sprite._f){ctx.save();if(car.dir<0){ctx.translate(car.x+25,car.y-14);ctx.scale(-1,1);ctx.drawImage(car.sprite,0,0,50,28)}else ctx.drawImage(car.sprite,car.x-25,car.y-14,50,28);ctx.restore()}else{ctx.fillStyle='#4a4a6a';ctx.fillRect(car.x-25,car.y-8,50,16);ctx.fillStyle='#87ceeb';ctx.fillRect(car.x-15,car.y-14,30,8);ctx.fillStyle='#333';ctx.beginPath();ctx.arc(car.x-15,car.y+8,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(car.x+15,car.y+8,5,0,Math.PI*2);ctx.fill()}if(car.speed>180){ctx.fillStyle='rgba(255,216,77,.3)';ctx.fillRect(car.dir>0?car.x+25:car.x-35,car.y-4,10,8)}}}

  drawPlayer(ctx){const p=this.world.player,px=this.getPX(),py=this.getPY();if(py>this.height+30||py<-30)return;if(p.invuln>0&&Math.floor(p.invuln*10)%2===0)return;
    const cs={alex:SP.alex,kai:SP.kai,maya:SP.maya,zezu:SP.zezu},cs2=cs[p.char];
    if(cs2&&cs2._l&&!cs2._f){ctx.save();if(p.facing<0){ctx.translate(px+14,py-22);ctx.scale(-1,1);ctx.drawImage(cs2,0,0,28,38)}else ctx.drawImage(cs2,px-14,py-22,28,38);ctx.restore()}
    else{ctx.save();if(p.facing<0){ctx.translate(px,py);ctx.scale(-1,1);ctx.translate(-px,-py)}
      ctx.fillStyle='#ff7a2e';ctx.fillRect(px-7,py-18,14,14);ctx.fillStyle='#48C6FF';ctx.fillRect(px-4,py-14,8,6);ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(px-3,py-13,3,3);ctx.fillStyle='#ff7a2e';ctx.fillRect(px-6,py-4,12,12);ctx.fillStyle='#333';ctx.fillRect(px-6,py+2,12,2);ctx.fillStyle='#ff7a2e';ctx.fillRect(px-9,py-3,3,8);ctx.fillRect(px+6,py-3,3,8);ctx.fillStyle='#fff';ctx.fillRect(px-9,py+3,3,3);ctx.fillRect(px+6,py+3,3,3);ctx.fillStyle='#ff7a2e';ctx.fillRect(px-5,py+8,4,8);ctx.fillRect(px+1,py+8,4,8);ctx.fillStyle='#fff';ctx.fillRect(px-6,py+14,5,4);ctx.fillRect(px+1,py+14,5,4);
      if(this.isPressed('ArrowUp')||this.isPressed('KeyW')){ctx.fillStyle='#ffd84d';ctx.fillRect(px-4,py+18,3,4+Math.sin(this.elapsed*20)*3);ctx.fillRect(px+1,py+18,3,4+Math.sin(this.elapsed*20+1)*3);ctx.fillStyle='#ff5cf4';ctx.fillRect(px-3,py+22,2,2+Math.sin(this.elapsed*25)*2);ctx.fillRect(px+2,py+22,2,2+Math.sin(this.elapsed*25+1)*2)}
      ctx.restore()}
    if(p.shield>0){ctx.strokeStyle='#8efcff';ctx.lineWidth=2;ctx.globalAlpha=.5+Math.sin(this.elapsed*8)*.3;ctx.beginPath();ctx.arc(px,py,20,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;ctx.lineWidth=1}
    if(p.atkCd>0){ctx.fillStyle='rgba(255,216,77,.3)';ctx.fillRect(px-10,py+22,20*(1-p.atkCd/1),2)}}

  drawParts(ctx){if(!this.settings.particles||!this.world)return;for(const p of this.world.particles){ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.color;ctx.fillRect(Math.floor(p.x-p.size/2),Math.floor(p.y-p.size/2),p.size,p.size)}ctx.globalAlpha=1}

  drawFG(ctx){if(this.world&&this.world.player.escaped){ctx.fillStyle='rgba(20,210,122,.12)';ctx.fillRect(0,0,this.width,this.height);ctx.fillStyle='#fff';ctx.font='bold 32px "Courier New",monospace';ctx.textAlign='center';ctx.fillText('DREAMER ASCENDS!',this.width/2,310);ctx.font='16px "Courier New",monospace';ctx.fillText(this.curMap.bossName+' DEFEATED!',this.width/2,345);ctx.textAlign='left'}}

  loop(now){const dt=Math.min(.033,(now-this.lastT)/1000);this.lastT=now;this.update(dt);this.render();requestAnimationFrame(this.loop.bind(this))}
}

function drawIC(ctx,name,cat){ctx.clearRect(0,0,32,32);const cols={Basic:'#ffd84d',Steel:'#c0c8d8',Magnetic:'#14d27a',Spring:'#ff7ae7',Quantum:'#8efcff',Plasma:'#b14cff',Crystal:'#ffd84d',Ghost:'#8efcff',Vine:'#14d27a',Cloud:'#fff',Rocket:'#ff4a4a',Sticky:'#14d27a',Spirit:'#8efcff',Gravity:'#5b3fd1',Phantom:'#b14cff',LoFi:'#ffd84d',Bass:'#5b3fd1',Chaos:'#ff4a4a',Float:'#5dc7ff',Zen:'#fff',Metal:'#a0a0a0',EightBit:'#ff5cf4',Cosmic:'#14d27a',Paintbrush:'#ff7a2e',Grapple:'#a0a0a0',TimeWatch:'#ffd84d',ShieldGen:'#5dc7ff',MagnetGlove:'#14d27a',GhostLantern:'#8efcff',WindFan:'#5dc7ff',DreamCatcher:'#ff5cf4'};const c=cols[name]||'#ffd84d';if(cat==='ladders'){ctx.fillStyle=c;ctx.fillRect(8,4,4,24);ctx.fillRect(20,4,4,24);ctx.fillStyle='#fff';for(let y=6;y<26;y+=6)ctx.fillRect(10,y,12,2)}else if(cat==='shoes'){ctx.fillStyle=c;ctx.fillRect(6,18,8,10);ctx.fillRect(18,18,8,10);ctx.fillStyle='#fff';ctx.fillRect(8,24,4,4);ctx.fillRect(20,24,4,4)}else if(cat==='radios'){ctx.fillStyle=c;ctx.fillRect(6,8,20,16);ctx.fillStyle='#1a1740';ctx.fillRect(8,10,16,8)}else if(cat==='tools'){ctx.fillStyle=c;if(name==='Paintbrush'){ctx.fillRect(14,4,4,24);ctx.fillStyle='#fff';ctx.fillRect(12,4,8,8)}else if(name==='WindFan'||name==='DreamCatcher'){ctx.beginPath();ctx.arc(16,16,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1740';ctx.beginPath();ctx.arc(16,16,5,0,Math.PI*2);ctx.fill()}else ctx.fillRect(8,8,16,16)}}

const game=new Game();
</script>
