<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DREAMERS CLIMB v25 — Dream-Arcade Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <style>
    :root{--rp:#5b3fd1;--hy:#ffd84d;--sb:#5dc7ff;--em:#14d27a;--np:#ff5cf4;--bg:#140f2b;--pn:rgba(12,8,30,0.95);--pb:rgba(255,255,255,0.12);--wh:#f6f8ff;--dn:#ff6b6b}
    *{box-sizing:border-box;image-rendering:pixelated}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#0a0618,#140f2b,#1a0f35);color:var(--wh);font-family:"Courier New",monospace;height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center}
    #game-root{position:relative;width:960px;height:640px;flex:none;transform-origin:center center;border:3px solid var(--rp);box-shadow:0 0 40px rgba(91,63,209,.5),inset 0 0 80px rgba(91,63,209,.15);background:#0a0618;overflow:hidden}
    #gameCanvas{display:block;width:960px;height:640px;background:transparent}
    #overlay-root{position:absolute;inset:0;pointer-events:none}
    .screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(10,6,24,.96),rgba(10,6,24,.99));pointer-events:auto;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes titlePulse{0%,100%{text-shadow:0 0 15px #5b3fd1,0 0 30px #ff5cf4,0 0 50px #ffd84d,3px 3px 0 #000}50%{text-shadow:0 0 25px #5b3fd1,0 0 50px #ff5cf4,0 0 80px #ffd84d,4px 4px 0 #000}}
    @keyframes floatIntro{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.02)}}
    .hidden{display:none!important}
    .panel{width:min(880px,95%);max-height:92%;overflow-y:auto;overflow-x:hidden;background:var(--pn);border:2px solid var(--pb);border-radius:12px;padding:20px;box-shadow:0 0 50px rgba(91,63,209,.3)}
    .panel::-webkit-scrollbar{width:8px}.panel::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:4px}.panel::-webkit-scrollbar-thumb{background:var(--rp);border-radius:4px}
    .title{font-size:44px;margin:0 0 8px;color:var(--hy);text-shadow:0 0 20px rgba(255,216,77,.7);letter-spacing:4px;animation:titlePulse 2s ease-in-out infinite}
    .subtitle{color:var(--sb);margin-bottom:16px;font-size:14px;letter-spacing:2px}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
    .card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;transition:all .2s;cursor:pointer}
    .card:hover{background:rgba(255,255,255,.06);border-color:var(--sb);transform:translateY(-2px)}
    .card.common{border-left:3px solid #a0a0a0}.card.rare{border-left:3px solid var(--sb)}.card.epic{border-left:3px solid #b14cff}.card.legendary{border-left:3px solid var(--hy)}.card.mythic{border-left:3px solid var(--np)}
    .item-icon{width:48px;height:48px;margin:0 auto 8px;background:rgba(0,0,0,.3);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .item-icon img{width:100%;height:100%;object-fit:contain}
    .item-name{font-weight:bold;font-size:13px;margin-bottom:3px}.item-desc{font-size:10px;color:rgba(255,255,255,.7);margin-bottom:4px;line-height:1.3}
    .item-cost{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--em)}
    .item-stats{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
    .stat-badge{font-size:9px;padding:2px 5px;background:rgba(91,63,209,.3);border-radius:3px;color:var(--sb)}
    button.dc-btn{background:linear-gradient(180deg,#6e4bff,#442cae);color:white;border:2px solid rgba(255,255,255,.12);border-radius:8px;padding:12px 16px;font-size:14px;cursor:pointer;transition:all .15s;font-family:inherit}
    button.dc-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(110,75,255,.4)}
    button.dc-btn:active{transform:translateY(1px)}
    button.dc-btn.secondary{background:linear-gradient(180deg,#29b8ff,#1a7cb8)}
    button.dc-btn.emerald{background:linear-gradient(180deg,#1de18d,#0f9d61)}
    button.dc-btn.warn{background:linear-gradient(180deg,#ff8c66,#d14c3f)}
    button.dc-btn.legendary{background:linear-gradient(180deg,#ffd84d,#b88345);color:#1a1740}
    button.dc-btn.pink{background:linear-gradient(180deg,#ff5cf4,#a83da0)}
    button.dc-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.center{text-align:center}
    .tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
    .tab{padding:8px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px 6px 0 0;cursor:pointer;transition:all .2s;font-size:13px;color:#ccc;font-family:inherit}
    .tab:hover{background:rgba(255,255,255,.08)}.tab.active{background:var(--rp);border-color:var(--sb);color:var(--hy)}
    .achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
    .achievement{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:10px;display:flex;align-items:center;gap:10px}
    .achievement.unlocked{border-color:var(--em);background:rgba(20,210,122,.08)}
    .map-card{background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden}
    .map-card:hover{border-color:var(--hy);transform:scale(1.02)}
    .map-card.selected{border-color:var(--hy);box-shadow:0 0 20px rgba(255,216,77,.3)}
    .map-card .boss-tag{position:absolute;top:8px;right:8px;font-size:10px;background:rgba(255,107,107,.3);padding:2px 8px;border-radius:4px;color:var(--dn)}
    .music-ctrl{position:absolute;bottom:8px;right:8px;z-index:20;display:flex;gap:4px;pointer-events:auto}
    .music-ctrl button{background:rgba(12,8,30,.85);border:1px solid rgba(255,255,255,.15);color:#ccc;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit;transition:all .15s}
    .music-ctrl button:hover{background:rgba(91,63,209,.5);color:#fff}
    .music-ctrl button.active{color:var(--hy);border-color:var(--hy)}
    @media(max-width:980px){#game-root{border:none}}
    /* ============ v25 DREAM-ARCADE MENU SYSTEM ============ */
    .dca-fontD{font-family:'Bungee','Courier New',monospace}
    .dca-menu{position:absolute;inset:0;overflow:hidden;background:radial-gradient(120% 80% at 50% -10%,#1b1147 0%,#0c0826 45%,#050310 100%)}
    .dca-aurora{position:absolute;inset:-20% -10% auto -10%;height:70%;background:
      radial-gradient(40% 60% at 20% 30%,rgba(20,210,122,.20),transparent 70%),
      radial-gradient(45% 65% at 75% 25%,rgba(255,92,244,.18),transparent 70%),

      filter:blur(14px);animation:auroraDrift 14s ease-in-out infinite alternate;pointer-events:none}
    @keyframes auroraDrift{0%{transform:translateX(-3%) scale(1.05)}100%{transform:translateX(4%) scale(1.12)}}
    .dca-grain{position:absolute;inset:0;opacity:.05;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.6) .5px,transparent .5px);background-size:3px 3px}
    .dca-vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 160px 30px rgba(0,0,0,.75)}
    .dca-stack{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;pointer-events:auto;padding-top:26px}
    .dca-hero{width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(255,216,77,.55)) drop-shadow(0 0 40px rgba(91,63,209,.5));animation:heroFloat 4s ease-in-out infinite}
    @keyframes heroFloat{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-10px) rotate(1.5deg)}}
    .dca-title{font-family:'Bungee','Courier New',monospace;font-size:46px;line-height:.95;letter-spacing:2px;margin:6px 0 0;
      background:linear-gradient(180deg,#fff4c2,#ffd84d 40%,#ff9d3d 75%,#b8631f);-webkit-background-clip:text;background-clip:text;color:transparent;
      filter:drop-shadow(0 2px 0 #5b1f00) drop-shadow(0 0 22px rgba(255,184,69,.55));animation:titleGlow 3s ease-in-out infinite}
    @keyframes titleGlow{0%,100%{filter:drop-shadow(0 2px 0 #5b1f00) drop-shadow(0 0 18px rgba(255,184,69,.45))}50%{filter:drop-shadow(0 2px 0 #5b1f00) drop-shadow(0 0 34px rgba(255,184,69,.8))}}
    .dca-sub{font-size:11px;letter-spacing:7px;color:#7fd8ff;text-shadow:0 0 12px rgba(93,199,255,.6);margin:4px 0 14px}
    .dca-menu-cols{display:flex;gap:18px;align-items:flex-start;justify-content:center}
    .dca-primary{display:flex;flex-direction:column;gap:9px;width:230px}
    .dca-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:230px}
    .dca-b{position:relative;overflow:hidden;font-family:'Bungee','Courier New',monospace;letter-spacing:1px;border:none;border-radius:12px;color:#fff;cursor:pointer;
      padding:13px 12px;font-size:13px;text-align:left;display:flex;align-items:center;gap:9px;
      background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,0)) , linear-gradient(180deg,#3a2a8c,#241a5e);
      box-shadow:0 4px 0 #140d36,0 8px 18px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);transition:transform .12s,box-shadow .12s,filter .12s}
    .dca-b:hover{transform:translateY(-2px);filter:brightness(1.12)}
    .dca-b:active{transform:translateY(3px);box-shadow:0 1px 0 #140d36,0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.18)}
    .dca-b::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-20deg);animation:btnShine 4.5s linear infinite}
    .dca-b .ico{font-size:17px;filter:drop-shadow(0 0 6px rgba(255,255,255,.5))}
    @keyframes btnShine{0%{left:-60%}55%,100%{left:130%}}
    .dca-b.play{font-size:17px;padding:16px 14px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,0)),linear-gradient(180deg,#ffce4a,#e8861f);color:#241400;box-shadow:0 5px 0 #6b3a00,0 10px 22px rgba(232,134,31,.45),inset 0 1px 0 rgba(255,255,255,.5)}
    .dca-b.vs{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,0)),linear-gradient(180deg,#ff5cf4,#a3239a);box-shadow:0 4px 0 #4d0a48,0 8px 18px rgba(163,35,154,.5),inset 0 1px 0 rgba(255,255,255,.25)}
    .dca-b.em{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,0)),linear-gradient(180deg,#1de18d,#0c8a55);box-shadow:0 4px 0 #064027,0 8px 16px rgba(12,138,85,.45),inset 0 1px 0 rgba(255,255,255,.25)}
    .dca-b.cy{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,0)),linear-gradient(180deg,#36b8ff,#1a6fae);box-shadow:0 4px 0 #093454,0 8px 16px rgba(26,111,174,.45),inset 0 1px 0 rgba(255,255,255,.25)}
    .dca-chips{display:flex;gap:9px;margin-top:16px}
    .dca-chip{min-width:74px;text-align:center;background:rgba(10,7,26,.72);border:1px solid rgba(255,255,255,.10);border-radius:10px;padding:6px 10px;backdrop-filter:blur(3px)}
    .dca-chip .k{font-size:8px;letter-spacing:2px;color:#8a7acc}
    .dca-chip .v{font-family:'Bungee','Courier New',monospace;font-size:16px;margin-top:2px}
    .dca-load{font-size:9px;color:#6a5fa0;letter-spacing:1px;margin-top:11px}
  </style>
</head>
<body>
<div id="game-root">
  <canvas id="gameCanvas" width="960" height="640"></canvas>
  <div id="overlay-root">
    <div id="intro-screen" class="screen"></div>
    <div id="menu-screen" class="screen hidden"></div>
    <div id="map-select-screen" class="screen hidden"></div>
    <div id="compete-screen" class="screen hidden"></div>
    <div id="shop-screen" class="screen hidden"></div>
    <div id="achievements-screen" class="screen hidden"></div>
    <div id="settings-screen" class="screen hidden"></div>
    <div id="game-over-screen" class="screen hidden"></div>
    <div id="leaderboard-screen" class="screen hidden"></div>
    <div id="vs-mode-screen" class="screen hidden"></div>
  </div>
  <div id="radio-hud" style="position:absolute;top:10px;left:10px;display:none;gap:8px;align-items:center;z-index:10;pointer-events:auto;">
    <button id="radio-toggle" style="background:#333;color:#fff;border:2px solid #5dc7ff;padding:6px 10px;border-radius:4px;cursor:pointer;font-size:14px;font-family:inherit;" title="Toggle Radio">&#x1f4fb;</button>
    <span id="radio-name" style="color:#5dc7ff;font-size:12px;font-family:monospace;">None</span>
    <button id="radio-special" disabled style="background:#333;color:#666;border:2px solid #444;padding:6px 10px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;" title="Radio Special">&#x26a1; Special</button>
  </div>
  <div class="music-ctrl" id="music-ctrl">
    <button id="music-toggle" title="Toggle music">&#x1f507;</button>
    <button id="music-switch" title="Switch track">&#x1f3b5; 1</button>
  </div>
  <!-- Web3 Wallet HUD (v22) -->
  <div id="wallet-hud" style="position:absolute;top:10px;right:10px;display:none;gap:8px;align-items:center;z-index:10;pointer-events:auto;">
    <button id="wallet-connect" style="background:linear-gradient(135deg,#9945ff,#14f195);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;">🔗 Connect</button>
    <span id="wallet-sol" style="color:#ffd84d;font-size:11px;font-family:monospace;display:none;">0.00 SOL</span>
  </div>
</div>
<script>
// ================================================================
// DREAMERS CLIMB v20.0 — FULL BUILD
// ================================================================
// Sprite paths - use absolute paths for file:// protocol
// v25: relative paths so the game works locally AND on GitHub (sprites/ ships in the repo)
const SB='sprites/16.39/';
const DS='sprites/legacy/';
const GZ='sprites/';
const V20='sprites/';
const GAME='sprites/';
const SC={};
function LS(p){if(SC[p])return SC[p];const i=new Image();i.src=encodeURI(p);i.onerror=()=>{i._f=true};i.onload=()=>{i._l=true};setTimeout(()=>{!i._l&&!i._f&&(i._f=true)},2000);SC[p]=i;return i}
function DSF(c,s,x,y,w,h,fb){if(s&&s._l&&!s._f){c.drawImage(s,x,y,w,h)}else{c.fillStyle=fb||'#888';c.fillRect(x,y,w,h);c.strokeStyle='rgba(255,255,255,0.3)';c.lineWidth=1;c.strokeRect(x,y,w,h)}}
function DSFRAME(c,s,fr,fw,fh,x,y,w,h,flip){if(!s||!s._l||s._f)return false;c.save();if(flip){c.translate(x+w,y);c.scale(-1,1);c.drawImage(s,fr*fw,0,fw,fh,0,0,w,h)}else c.drawImage(s,fr*fw,0,fw,fh,x,y,w,h);c.restore();return true}
// ========== ALL SPRITES ==========
const SP={
  // Characters - use fallback procedural for now
  alex:null,kai:null,maya:null,zezu:null,
  // Attacks
  bossAtk:LS(SB+'FINAL BOSS ATTACK.png'),
  // Shoes
  puebloShoes:LS(SB+'PUEBLO SHOES.png'),marshShoes:LS(SB+'MARSH SHOES.png'),cityShoes:LS(SB+'CITY SHOES.png'),
  // Radios
  puebloRadio:LS(SB+'PUEBLO RADIO.png'),radioBase:LS(SB+'Radio Base.png'),
  // Pickups
  hazard:LS(SB+'HAZARD SPRITE.png'),holdCoins:LS(SB+'HOLD MORE COINS SPRITE UPGRADE.png'),
  powerup1:LS(SB+'POWERUP SPRITE.png'),powerupMed:LS(SB+'POWERUP MEDIUM.png'),powerMove1:LS(SB+'POWERUP SPRITE.png'),
  citySilver:LS(SB+'CITY SILVER SPRITE.png'),cityHazard:LS(SB+'CITY HAZARD.png'),
  // Health/Gold
  goldBar:LS(SB+'GOLD BAR PUEBLO.png'),healthHeart:LS(SB+'HEALTH HEART SPRITES.png'),
  marshHealth:LS(SB+'MARSH HEALTH RESTORE SPRITE PICKUP.png'),foodHealth:LS(SB+'FOOD HEALTH PUEBLO.png'),
  // Charged attacks
  charged1:LS(SB+'charged1.png'),charged2:LS(SB+'charged2.png'),charged3:LS(SB+'charged3.png'),
  charged4:LS(SB+'charged4.png'),charged5:LS(SB+'charged5.png'),charged6:LS(SB+'charged6.png'),
  // Arrays
  grass:[],bushes:[],tiles:[],leaves:[],trees:[],cars:[],menuOverlays:[],
  // Enemies - use procedural fallback
  cowboyIdle:null,cowboyWalk:null,bird1Walk:null,droneIdle:null,
  // Legacy sprites
  marshArmor:null,marshGloves:null,puebloArmor:null,puebloGloves:null,
  cityArmor:null,cityGloves:null,
  grassSprite:null,iconset:null,
  cityBg:null,citySky:null,
  moneySprite:null,fountain:null,ladder1:null,ladder2:null,
  stones:[],benches:[],
  // Marsh night bg layers
  marshBg1:LS('sprites/2 Background/Night/1.png'),marshBg2:LS('sprites/2 Background/Night/2.png'),marshBg3:LS('sprites/2 Background/Night/3.png'),marshBg4:LS('sprites/2 Background/Night/4.png'),marshBg5:LS('sprites/2 Background/Night/5.png'),
  // Shooting FX
  fxCharged:LS('sprites/effects/SHOOTING_FX/charged/spritesheet.png'),
  fxBolt:LS('sprites/effects/SHOOTING_FX/Bolt/spritesheet.png'),
  fxPulse:LS('sprites/effects/SHOOTING_FX/Pulse/spritesheet.png'),
  fxSpark:LS('sprites/effects/SHOOTING_FX/spark/spritesheet.png'),
  fxWave:LS('sprites/effects/SHOOTING_FX/waveform/spritesheet.png'),
  fxCrossed:LS('sprites/effects/SHOOTING_FX/crossed/spritesheet.png'),
  hit1:LS('sprites/effects/SHOOTING_FX/hits/hits-1/spritesheet.png'),
  hit2:LS('sprites/effects/SHOOTING_FX/hits/Hits-2/spritesheet.png'),
  hit3:LS('sprites/effects/SHOOTING_FX/hits/Hits-3/spritesheet.png'),
  hit4:null,hit5:null,hit6:null,
  hitPurple:null,hitBlue:null,hitGreen:null,hitRed:null,hitYellow:null,
  puShieldGold:null,puBoltGold:null,puStarGold:null,puShieldSilver:null,puBoltBronze:null,
  puPillBlue:null,puPillGreen:null,puPillRed:null,puPowerGreen:null,puPowerBlue:null,puPowerRed:null,
  laserBlue:null,laserGreen:null,laserRed:null,meteorSmall:null,meteorTiny:null,
  fireEffects:[],
  // V20 Sprites
  beams:LS(V20+'beams.png'),
  cityMega:LS(V20+'CITY_MEGA.png'),
  shippingDock:LS(V20+'SHIPPING_DOCKS_AREA.png'),
  frogman:LS(V20+'frogman (1).png'),
  frogmanCrown:LS(V20+'frogman_crown.png'),
  fireball1:LS(V20+'Fireball1.png'),fireball2:LS(V20+'Fireball2.png'),
  explosionRed:LS(V20+'Free  Effect Bullet Impact Explosion 32x32 V1/Red Effect Bullet Impact Explosion 32x32.png'),
  explosionBlue:LS(V20+'Free  Effect Bullet Impact Explosion 32x32 V1/Blue Effect Bullet Impact Explosion 32x32.png'),
  explosionGreen:LS(V20+'Free  Effect Bullet Impact Explosion 32x32 V1/Green Effect Bullet Impact Explosion 32x32.png'),
  ninjaSprite:LS(V20+'Ninja.png'),
  tilesetBg:LS(V20+'free_flat_tileset/PNG/Background.png'),
  tilesetTiles:LS(V20+'free_flat_tileset/PNG/Tileset.png'),
  uiBigPieces:LS(GAME+'ui_big_pieces.png'),
  uiSplit:LS(GAME+'ui_split.png')
};

// ========== MUSIC ==========
const MUSIC={tracks:[{src:'sprites/audio/DREAMERS GAME MUSIC.mp3',label:'Track 1'},{src:'sprites/audio/DREAMERS GAME ALTERNATE SELECTION MUSIC.mp3',label:'Track 2'}],current:0,audio:null,playing:false,volume:.4,
init(){this.audio=new Audio();this.audio.loop=true;this.audio.volume=this.volume;this.loadTrack(0);this.updateUI()},
loadTrack(i){this.current=i;this.audio.src=encodeURI(this.tracks[i].src);if(this.playing)this.audio.play().catch(()=>{});this.updateUI()},
toggle(){if(this.playing){this.audio.pause();this.playing=false}else{this.audio.play().catch(()=>{});this.playing=true}this.updateUI()},
switchTrack(){this.current=(this.current+1)%this.tracks.length;this.loadTrack(this.current)},
updateUI(){const t=document.getElementById('music-toggle'),s=document.getElementById('music-switch');if(t){t.innerHTML=this.playing?'&#x1f50a;':'&#x1f507;';t.className=this.playing?'active':''}if(s)s.innerHTML='&#x1f3b5; '+(this.current+1)}};

class MoveSys{
  constructor(g){this.g=g;this.mc=0}
  // v20: helper — check if key matches current control scheme
  isCtrl(action){const c=getCtrl(),g=this.g;return c[action]&&c[action].some(k=>g.isPressed(k))}
  consumeCtrl(action){const c=getCtrl(),g=this.g;return c[action]&&c[action].some(k=>g.consumePress(k))}
  update(dt){
    const g=this.g,w=g.world,p=w.player;if(!p.alive||p.escaped)return;
    if(p.atkCd>0)p.atkCd-=dt;
    if(p.normalAtkCd>0)p.normalAtkCd-=dt;
    if(p.floatingTimer>0){p.floatingTimer-=dt;if(p.floatingTimer<=0)p.floating=false}
    if(p.sTrans>0){p.sTrans-=dt*5;if(p.sTrans<=0){p.side=p.sTo;p.sTrans=0}return}
    this.mc-=dt;
    const sh=SHOES[p.shoes]||SHOES.Cloud,md=(sh.s?.spd||50)>70?.05:(sh.s?.spd||50)>55?.07:.09;
    // v20: Normal attack (Z/G based on scheme) — quick melee, works in climbing AND boss
    if(this.consumeCtrl('attack')&&p.normalAtkCd<=0&&!w.bossActive){this.doNormalAttack()}
    // Ladder place/remove — use attack/special keys when NOT in boss mode
    if(!w.bossActive){
      if(g.consumePress('KeyZ')&&activeScheme==='classic')g.ladSys.place();
      if(g.consumePress('KeyX')&&activeScheme==='classic')g.ladSys.removeNear();
      if(activeScheme!=='classic'){
        if(g.consumePress('KeyZ'))g.ladSys.place();
        if(g.consumePress('KeyX'))g.ladSys.removeNear();
      }
    }
    // Charging attack (hold space) — boss fight
    if(g.isPressed('Space')&&w.bossActive){
      if(!p.charging){p.charging=true;p.chargeT=0}
      p.chargeT+=dt;
      if(this.isCtrl('move')){const c=getCtrl();if(g.isPressed(c.move[0]))p.aimAngle+=dt*3;if(g.isPressed(c.move[1]))p.aimAngle-=dt*3}
      if(this.isCtrl('climb'))p.aimAngle=lerp(p.aimAngle,-Math.PI/2,dt*5);
      return;
    }
    if(p.charging&&!g.isPressed('Space')){
      g.bossSys.fireCharged(p.chargeT);p.charging=false;p.chargeT=0;
    }
    // v20: Normal attack in boss mode too
    if(this.consumeCtrl('attack')&&w.bossActive&&p.normalAtkCd<=0){this.doNormalAttack()}
    if(g.consumePress('Space')&&!w.bossActive){this.tryPaint();if(w.bossActive)g.bossSys.fireCharged(0);else this.climbAttack()}
    if(this.mc>0)return;
    let moved=false;
    if(!w.bossActive){
      const c=getCtrl();
      if(g.isPressed(c.move[0])||g.isPressed('ArrowLeft')||g.isPressed('KeyA')){p.x-=.12;p.facing=-1;if(p.x<.06){p.sFrom=p.side;p.sTo=(p.side-1+4)%4;p.sTrans=1;p.x=.94;moved=true}}
      if(g.isPressed(c.move[1])||g.isPressed('ArrowRight')||g.isPressed('KeyD')){p.x+=.12;p.facing=1;if(p.x>.94){p.sFrom=p.side;p.sTo=(p.side+1)%4;p.sTrans=1;p.x=.06;moved=true}}
      p.x=clamp(p.x,.06,.94);
      // v20: Climb up (also triggers jump visual)
      if(this.isCtrl('climb')||g.isPressed('ArrowUp')||g.isPressed('KeyW')){
        if(g.ladSys.canClimb(1)){
          let step=p.ladder==='Spring'?2:1;const nf=p.floor+step;
          if(nf>=g.curMap.floors&&!w.bossActive){w.bossActive=true;p.onBossRoof=true;p.floor=g.curMap.floors;p.x=.5;p.aimAngle=-Math.PI/2}
          else{p.floor=nf}
          moved=true;g.strkSys.onClimb();g.addScore(10*step)}}
      if(this.isCtrl('down')||g.isPressed('ArrowDown')||g.isPressed('KeyS')){if(g.ladSys.canClimb(-1)){p.floor=Math.max(0,p.floor-1);moved=true}}
    } else {
      // Boss arena — walk + jump + aim
      const c=getCtrl();
      if(g.isPressed(c.move[0])||g.isPressed('ArrowLeft')||g.isPressed('KeyA')){p.x-=.05;p.facing=-1;moved=true}
      if(g.isPressed(c.move[1])||g.isPressed('ArrowRight')||g.isPressed('KeyD')){p.x+=.05;p.facing=1;moved=true}
      p.x=clamp(p.x,.02,.98);
      // v20: Jump in boss arena
      if((this.isCtrl('jump')||g.isPressed('ArrowUp')||g.isPressed('KeyW'))&&p.grounded){
        p.vy=-350;p.grounded=false;p.jumping=true}
      // Gravity in boss arena
      if(!p.grounded){p.vy+=600*dt;if(p.floating)p.vy=Math.min(p.vy,30);p.bossY+=p.vy*dt;if(p.bossY>=H-80){p.bossY=H-80;p.vy=0;p.grounded=true;p.jumping=false}}
      // Charged attack

      // Aim
      if(g.isPressed('ArrowUp')||g.isPressed('KeyW'))p.aimAngle-=dt*2.5;
      if(g.isPressed('ArrowDown')||g.isPressed('KeyS'))p.aimAngle+=dt*2.5;
      p.aimAngle=clamp(p.aimAngle,-Math.PI,0);
    }
    if(moved)this.mc=md;
  }
  // v20: Normal attack — quick melee, lower damage but faster
  doNormalAttack(){const g=this.g,p=g.world.player;if(p.normalAtkCd>0)return;

      const b=g.bossSys.boss,bx=b.type==='lochness'?(b._hitbox?b._hitbox.x+40:b.x):b.x,by=b.type==='lochness'?(b._hitbox?b._hitbox.y+50:b.swoopY):b.y;

        for(let i=0;i<4;i++)g.addPart(bx,by,'#ff5cf4',.3,3,rand(-20,20),rand(-15,5))}}
    // Attack visual

  update(dt){const w=this.g.world;for(const l of w.ladders){if(!l.destroyed&&(l.type==='Quantum'||l.type==='Ghost'))l.phase+=dt*3}for(const e of w.effects){if(e.duration!=null)e.duration-=dt}w.effects=w.effects.filter(e=>e.duration==null||e.duration>0);for(const l of w.ladders){if(l.destroyed)l.fade=(l.fade||1)-dt*1.4}w.ladders=w.ladders.filter(l=>!l.destroyed||(l.fade||0)>0);
    // Window open/close cycle
    for(const sd of w.sideData)for(const win of sd.windows){win.openTimer-=dt;if(win.openTimer<=0){win.open=!win.open;win.openTimer=rand(win.open?3:1.5,win.open?8:4)}}}
  place(){const g=this.g,w=g.world,p=w.player;if(w.ladders.find(l=>l.side===p.side&&l.floor===p.floor&&Math.abs(l.x-p.x)<.08&&!l.destroyed))return;const hp={Basic:1,Steel:3,Magnetic:4,Spring:2,Quantum:2,Plasma:3,Crystal:3,Ghost:1,Vine:5};w.ladders.push({side:p.side,floor:p.floor,x:p.x,type:p.ladder,hp:hp[p.ladder]||1,maxHp:hp[p.ladder]||1,destroyed:false,phase:0,fade:1});g.addScore(5);g.profile.stats.laddersPlaced++;for(let i=0;i<4;i++)g.addPart(g.getPX(),g.getPY(),'#ffd84d',.25,2,(Math.random()-.5)*20,-10-Math.random()*10)}
  removeNear(){const w=this.g.world,p=w.player;let best=null,bd=Infinity;for(const l of w.ladders){if(l.side!==p.side||l.destroyed)continue;const d=Math.abs(l.floor-p.floor)+Math.abs(l.x-p.x);if(d<bd){bd=d;best=l}}if(best&&bd<.25)best.destroyed=true}
  canClimb(dir){const w=this.g.world,p=w.player;if(p.floor+dir<0)return false;
    // Only block if directly at a closed window - check x position
    // v25: OPEN windows block climbing (something's in the way); closed windows are climbable
    if(dir>0){const sd=w.sideData[p.side],win=sd.windows.find(wi=>wi.floor===p.floor&&wi.open);if(win){const wx=SL+24+win.xSlot*(SW/4)+10,px=this.g.getPX();if(Math.abs(wx-px)<18)return false}}
    const paints=w.effects.filter(e=>e.type==='paint'&&e.side===p.side&&e.floor===p.floor);const lad=w.ladders.find(l=>l.side===p.side&&l.floor===p.floor&&!l.destroyed&&Math.abs(l.x-p.x)<(paints.length>0?.14:.1));if(lad)return true;const grp=(SHOES[p.shoes]?.s?.grp||40);if((grp>60||grp>40&&Math.random()<.18)&&dir>0)return true;return false}
  dmgAt(side,floor,x){const w=this.g.world;const l=w.ladders.find(l=>l.side===side&&l.floor===floor&&!l.destroyed&&Math.abs(l.x-x)<.08);if(!l)return;if(w.player.radio==='Zen'&&Math.random()<.3)return;l.hp--;if(l.hp<=0)l.destroyed=true}
}

// ========== FALLING OBJECTS ==========
class FallSys{
  constructor(g){this.g=g;this.st=.8}
  update(dt){const g=this.g,w=g.world,p=w.player;if(w.bossActive)return;let rm=1;if(p.radio==='LoFi')rm=1.35;if(p.radio==='Chaos')rm=.72;if(p.radio==='Float')rm=1.55;if(p.radio==='Cosmic')rm=1.8;this.st-=dt;if(this.st<=0&&!p.escaped){this.spawn();this.st=Math.max(.15,.9-Math.min(p.floor/100,2)*.3)*rm}
    const slow=g.strkSys.hasSlow();
    for(const o of w.fallObj){let sm=slow?.6:1;const spd=(SHOES[p.shoes]?.s?.spd||50);if(p.radio==='Float'||spd>65)sm*=.72;o.y+=o.vy*dt*sm;
      if(p.radio==='Bass')o.x+=Math.sin(g.elapsed*8+o.seed)*16*dt;
      for(const l of w.ladders){if(l.side!==o.side||l.destroyed)continue;const lx=AL+l.x*AW;const lt=g.getFloorY(l.floor+1)+8,lb=g.getFloorY(l.floor)+8;if(o.x>lx-10&&o.x<lx+10&&o.y>lt&&o.y<lb){g.ladSys.dmgAt(l.side,l.floor,l.x);o.dead=true;g.shake=2;break}}
      if(o.side===p.side){const px=g.getPX(),py=g.getPY();if(o.x>px-10&&o.x<px+10&&o.y>py-18&&o.y<py+10){
        // v20: Pickup items give bonuses
        if(o.isPickup){
          if(o.kind==='health'||o.kind==='food'||o.kind==='marshHealth'){p.hp=Math.min(p.maxHp,p.hp+1);for(let i=0;i<6;i++)g.addPart(o.x,o.y,'#ff6b6b',.4,3,rand(-15,15),rand(-20,-5))}
          else if(o.kind==='gold'){g.addScore(50);g.addEm(3);for(let i=0;i<8;i++)g.addPart(o.x,o.y,'#ffd84d',.5,3,rand(-20,20),rand(-25,-5))}
          else if(o.kind==='heart'){p.hp=Math.min(p.maxHp,p.hp+1);for(let i=0;i<6;i++)g.addPart(o.x,o.y,'#ff6b6b',.4,3,rand(-15,15),rand(-20,-5))}
          o.dead=true;
        }else{const grp=(SHOES[p.shoes]?.s?.grp||40);if(!((grp>70||grp>50&&Math.random()<.3))){g.dmgPlayer(1,'hazard');o.dead=true}}}
      if(o.y>H+20)o.dead=true}
    w.fallObj=w.fallObj.filter(o=>!o.dead)}
  }
  spawn(){const w=this.g.world,g=this.g,side=Math.floor(Math.random()*4),x=AL+30+Math.random()*(AW-60);const r=Math.random();
    // v20: Spawn health/gold pickups mixed with hazards
    let k='brick',isPickup=false;
    if(r<.15){// Health potion
      k='health';isPickup=true;w.fallObj.push({side,x,y:-20,w:20,h:20,vy:60*(1+w.player.floor/200*.2),kind:k,seed:Math.random()*1000,isPickup:true});return}
    if(r<.22){// Gold bar
      k='gold';isPickup=true;w.fallObj.push({side,x,y:-20,w:18,h:14,vy:70*(1+w.player.floor/200*.2),kind:k,seed:Math.random()*1000,isPickup:true});return}
    if(r<.27&&g.curMap.name==='Pueblo'){// Food health (Pueblo only)
      k='food';isPickup=true;w.fallObj.push({side,x,y:-20,w:20,h:20,vy:55,kind:k,seed:Math.random()*1000,isPickup:true});return}
    if(r<.32&&g.curMap.name==='Marsh'){// Marsh health
      k='marshHealth';isPickup=true;w.fallObj.push({side,x,y:-20,w:20,h:20,vy:55,kind:k,seed:Math.random()*1000,isPickup:true});return}
    // Regular hazards
    if(r>.5)k='crate';if(r>.7)k='glass';if(r>.85)k='tv';
    const sz={brick:[14,10,120],crate:[18,18,100],glass:[12,20,135],tv:[20,16,110]};const[w0,h0,vy]=sz[k];
    w.fallObj.push({side,x,y:-20,w:w0,h:h0,vy:vy*(1+w.player.floor/150*.3),kind:k,seed:Math.random()*1000})}
}

// ========== ENEMIES ==========
class EnemySys{
  constructor(g){this.g=g}
  update(dt){const g=this.g,w=g.world,p=w.player;if(w.bossActive)return;const et=g.curMap.enemyType;const tc=Math.min(8,1+Math.floor(Math.max(0,p.floor-5)/12));
    while(w.enemies.length<tc){const ef=Math.floor(rand(2,p.floor+5)),es=Math.floor(rand(0,4));if(!w.enemies.find(e=>e.side===es&&Math.abs(e.floor-ef)<2)){
      // Cowboys only at ground floors (0-5)
      const fl=et==='cowboy'?Math.floor(rand(0,6)):ef;
      w.enemies.push({side:es,floor:fl,x:rand(.2,.8),dir:Math.random()<.5?-1:1,timer:rand(0,2),cd:rand(1.5,3),et,af:0})}else break}
    for(let i=w.enemies.length-1;i>=0;i--){const e=w.enemies[i];if(Math.abs(e.floor-p.floor)>14){w.enemies.splice(i,1);continue}
      e.timer+=dt;e.af=Math.floor(e.timer*6)%4;
      if(e.et==='cowboy'){e.x+=e.dir*dt*.05;if(e.x<.12){e.x=.12;e.dir=1}if(e.x>.88){e.x=.88;e.dir=-1}e.cd-=dt;if(e.cd<=0){e.cd=rand(2.5,4);if(Math.abs(e.floor-p.floor)<=3&&e.side===p.side)w.fallObj.push({side:e.side,x:AL+e.x*AW,y:g.getFloorY(e.floor),w:10,h:10,vy:120,kind:'glass',seed:Math.random()*1000})}if(Math.abs(e.floor-p.floor)<=1&&e.side===p.side&&Math.abs(e.x-p.x)<.12)g.dmgPlayer(1,'enemy')}
      else if(e.et==='monkey'){e.x+=e.dir*dt*.15;if(e.x<.08){e.x=.08;e.dir=1}if(e.x>.92){e.x=.92;e.dir=-1}e.cd-=dt;if(e.cd<=0){e.cd=rand(1.2,2.5);if(Math.random()<.4)e.floor=Math.max(0,e.floor+(Math.random()<.5?1:-1));if(Math.abs(e.floor-p.floor)<=1&&e.side===p.side&&Math.abs(e.x-p.x)<.15)g.dmgPlayer(1,'enemy')}}
      else if(e.et==='drone'){e.x+=e.dir*dt*.2;if(e.x>1.1){e.x=-.1;e.floor=Math.max(0,p.floor+Math.floor(rand(-3,3)));e.side=Math.floor(rand(0,4))}if(e.x<-.1){e.x=1.1;e.dir=1}e.cd-=dt;if(e.cd<=0){e.cd=rand(2,3.5);if(Math.abs(e.floor-p.floor)<=2&&e.side===p.side)w.fallObj.push({side:e.side,x:AL+e.x*AW,y:g.getFloorY(e.floor),w:12,h:12,vy:140,kind:'tv',seed:Math.random()*1000})}if(Math.abs(e.floor-p.floor)<=1&&e.side===p.side&&Math.abs(e.x-p.x)<.12)g.dmgPlayer(1,'enemy')}
    }
  }
}

// ========== BOSS SYSTEM (Charged Attacks + Aim Line) ==========
class BossSys{
  constructor(g){this.g=g;this.boss=null;this.at=2;this.proj=[];this.pProj=[];this.shardT=0;this.shards=[];this.hitFx=[]}
  ensureBoss(){if(this.boss)return;const m=this.g.curMap;let hp=30;if(m.boss==='lochness')hp=35;if(m.boss==='hawk')hp=25;if(m.boss==='demon')hp=50;this.boss={type:m.boss,hp,maxHp:hp,active:false,x:480,y:80,phase:0,swoopY:80,neckAng:0,hitFlash:0,
    // v20: Loch dive phases + Witch laser
    divePhase:0,diveTimer:0,submerged:false,heartsSpawned:false,laserWarn:0,laserX:0,laserActive:false,laserTimer:0}}
  update(dt){this.ensureBoss();const g=this.g,w=g.world,p=w.player;this.boss.active=!!w.bossActive&&!w.bossDefeated;if(this.boss.hitFlash>0)this.boss.hitFlash-=dt;
    // Hit FX animation
    this.hitFx=this.hitFx.filter(h=>{h.t+=dt;return h.t<.4});
    if(!this.boss.active)return;
    const b=this.boss;b.phase+=dt;this.at-=dt;this.shardT-=dt;
    if(this.shardT<=0){this.shardT=rand(2,4);this.shards.push({x:AL+rand(40,AW-40),y:rand(180,480),col:false,bob:rand(0,6.28)})}
    for(const s of this.shards){s.bob+=dt*4;const px=g.getPX(),py=g.getPY();if(!s.col&&Math.abs(s.x-px)<20&&Math.abs(s.y-py)<20){s.col=true;g.addScore(30);g.addEm(2);for(let i=0;i<8;i++)g.addPart(s.x,s.y,'#14d27a',.5,3,rand(-30,30),rand(-30,10))}}
    this.shards=this.shards.filter(s=>!s.col);
    // Boss AI
    if(b.type==='witch'){b.x=480+Math.sin(b.phase*1)*200;b.y=80+Math.sin(b.phase*.7)*50;
      // v20: Laser beam attack cycle
      if(b.laserWarn>0){b.laserWarn-=dt;if(b.laserWarn<=0){b.laserActive=true;b.laserTimer=0.8}}
      if(b.laserActive){b.laserTimer-=dt;const px=g.getPX(),py=g.getPY();if(Math.abs(px-b.laserX)<20&&py>100){g.dmgPlayer(1,'boss')}if(b.laserTimer<=0)b.laserActive=false}
      if(this.at<=0){this.at=Math.max(.7,2.2-b.phase*.01);
        if(Math.random()<.4){// Laser beam attack
          b.laserX=g.getPX();b.laserWarn=1;b.laserActive=false;
        }else{// Spell projectile
          this.proj.push({x:b.x,y:b.y+40,vx:(g.getPX()-b.x)*.25,vy:100,type:'spell',life:3.5});
        }for(let i=0;i<4;i++)g.addPart(b.x,b.y+30,'#b14cff',.3,2,rand(-20,20),rand(5,20))}}
    if(b.type==='lochness'){
      // v20: Dive phases — ATTACKING → DIVING (hearts spawn) → RESURFACING (charged)
      if(b.divePhase===0){// ATTACKING
        b.submerged=false;b.neckAng=Math.sin(b.phase*.5)*.9;b.x=SL-50;b.swoopY=180+Math.sin(b.phase*.35)*90;
        // Neck swings toward player at ANY height
        const tx=g.getPX(),ty=g.getPY();b.neckAng=Math.atan2(ty-(H-180),tx-SL)*.6;
        if(this.at<=0){this.at=rand(1.5,2.8);
          for(let i=0;i<3;i++)this.proj.push({x:SL+20,y:b.swoopY+i*35,vx:180,vy:rand(-15,15),type:'acid',life:2.5});
          if(Math.random()<.4){this.proj.push({x:SL+40,y:b.swoopY,vx:(tx-SL)*.3,vy:(ty-b.swoopY)*.3,type:'acid',life:3})}
          g.shake=6;
          // Chance to dive
          if(Math.random()<.25&&b.phase>5){b.divePhase=1;b.diveTimer=5;b.heartsSpawned=false}}
      }else if(b.divePhase===1){// DIVING — boss underwater, hearts spawn
        b.submerged=true;b.y=H+100;b.swoopY=H+100;
        if(!b.heartsSpawned){b.heartsSpawned=true;
          for(let i=0;i<3;i++){w.fallObj.push({side:0,x:AL+80+i*80,y:-20,w:20,h:20,vy:60,kind:'heart',seed:Math.random()*1000})}}
        b.diveTimer-=dt;if(b.diveTimer<=0){b.divePhase=2;b.diveTimer=2}
      }else if(b.divePhase===2){// RESURFACING — charged attack
        b.submerged=false;b.y=H-100;b.swoopY=H-100;b.diveTimer-=dt;
        // Fire burst of acid on resurface
        if(b.diveTimer>1.5&&!b._resurged){b._resurged=true;g.shake=10;
          for(let i=0;i<6;i++)this.proj.push({x:SL+rand(0,100),y:H-100,vx:rand(80,250),vy:rand(-80,30),type:'acid',life:3})}
        if(b.diveTimer<=0){b.divePhase=0;b._resurged=false;b.heartsSpawned=false}}
      // v20: Fixed hitbox — boss is always hittable when not submerged
      b._hitbox={x:b.submerged?-9999:SL-70,y:b.submerged?-9999:b.swoopY-30,w:80,h:100};
    }
    if(b.type==='hawk'){b.x=480+Math.sin(b.phase*1.8)*260;b.y=50+Math.abs(Math.sin(b.phase*.45))*120;if(this.at<=0){this.at=Math.max(.5,1.6-b.phase*.008);this.proj.push({x:b.x+rand(-20,20),y:b.y+30,vx:rand(-25,25),vy:130,type:'drop',life:3.5});if(Math.random()<.3)this.proj.push({x:b.x,y:b.y,vx:(g.getPX()-b.x)*.45,vy:70,type:'swoop',life:2})}}
    if(b.type==='demon'){b.x=480+Math.sin(b.phase*1.2)*220;b.y=60+Math.sin(b.phase*.8)*80;if(this.at<=0){this.at=Math.max(.4,1.2-b.phase*.006);this.proj.push({x:b.x+rand(-30,30),y:b.y+20,vx:rand(-30,30),vy:150,type:'fire',life:2.5});this.proj.push({x:b.x,y:b.y+30,vx:(g.getPX()-b.x)*.35,vy:90,type:'spell',life:3});if(Math.random()<.5)for(let i=0;i<5;i++)this.proj.push({x:b.x+rand(-40,40),y:b.y+rand(0,40),vx:rand(-20,20),vy:rand(80,140),type:'fire',life:2})}}
    // Update boss projectiles
    for(const pr of this.proj){pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;const px=g.getPX(),py=g.getPY();if(Math.abs(pr.x-px)<16&&Math.abs(pr.y-py)<16){g.dmgPlayer(1,'boss');pr.life=0}}
    this.proj=this.proj.filter(p=>p.life>0&&p.y<H+30&&p.x>-30&&p.x<W+30);
    // Update player projectiles
    for(const pp of this.pProj){pp.x+=pp.vx*dt;pp.y+=pp.vy*dt;pp.life-=dt;
      // v20: Use hitbox for lochness, standard for others
      const bx=b.type==='lochness'?(b._hitbox?b._hitbox.x+40:b.x):b.x;
      const by=b.type==='lochness'?(b._hitbox?b._hitbox.y+50:b.swoopY):b.y;
      const hitR=b.type==='lochness'?40:35;
      if(Math.abs(pp.x-bx)<hitR&&Math.abs(pp.y-by)<hitR&&!b.submerged){b.hp-=pp.dmg;b.hitFlash=.2;g.addScore(40*pp.dmg);g.shake=4;
        // v20: Explosion FX sprite on boss hit
        this.hitFx.push({x:pp.x+rand(-20,20),y:pp.y+rand(-20,20),t:0,color:pp.color,useExplosion:true});
        for(let i=0;i<6;i++)g.addPart(bx,by,pp.color||'#ffd84d',.4,3,rand(-40,40),rand(-30,10));pp.life=0}}
    this.pProj=this.pProj.filter(p=>p.life>0&&p.y>-30&&p.x>-30&&p.x<W+30);
    if(b.hp<=0&&!w.bossDefeated){w.bossDefeated=true;g.addScore(500);g.addEm(25);g.profile.stats.bossesDefeated++;for(let i=0;i<40;i++)g.addPart(480,100,'#ffd84d',.8,4,rand(-80,80),rand(-80,-20));g.triggerVictory()}}

  fireCharged(chargeT){
    const g=this.g,p=g.world.player;if(!this.boss||!this.boss.active||p.side!==0)return;if(p.atkCd>0)return;
    const px=g.getPX(),py=g.getPY(),tool=TOOLS[p.tool]||TOOLS.WindFan;
    const charge=Math.min(chargeT||0,2);// Max 2s charge
    const dmg=charge>.5?Math.floor(1+charge*2):1;
    const speed=250+charge*100;
    const angle=p.aimAngle;
    const colors={projectile:'#ffd84d',beam:'#8efcff',hook:'#14d27a',pulse:'#ff5cf4',shield:'#5dc7ff',magnet:'#14d27a',melee:'#ff5cf4'};
    const col=colors[tool.at]||'#ffd84d';
    if(tool.at==='pulse'){
      // Area blast
      const bx=this.boss.x,by=this.boss.type==='lochness'?this.boss.swoopY:this.boss.y;
      const dist=Math.hypot(bx-px,by-py);
      if(dist<150+charge*50){this.boss.hp-=dmg;this.boss.hitFlash=.2;g.shake=6;this.hitFx.push({x:(px+bx)/2,y:(py+by)/2,t:0,color:'#ff5cf4'});for(let i=0;i<12;i++)g.addPart(px,py,'#ffd84d',.5,3,rand(-60,60),rand(-60,60))}
      p.atkCd=.8;
    } else if(tool.at==='shield'){
      const bx=this.boss.x,by=this.boss.type==='lochness'?this.boss.swoopY:this.boss.y;
      const dist=Math.hypot(bx-px,by-py);
      if(dist<100+charge*30){this.boss.hp-=dmg+1;this.boss.hitFlash=.25;g.shake=8;p.shield=Math.min(3,p.shield+1);this.hitFx.push({x:bx,y:by,t:0,color:'#5dc7ff'});for(let i=0;i<10;i++)g.addPart(bx,by,'#5dc7ff',.5,3,rand(-50,50),rand(-50,10))}
      p.atkCd=1;
    } else if(tool.at==='magnet'){
      for(const s of this.shards){s.x=lerp(s.x,px,.3);s.y=lerp(s.y,py,.3)}
      const bx=this.boss.x,by=this.boss.type==='lochness'?this.boss.swoopY:this.boss.y;
      if(Math.hypot(bx-px,by-py)<120){this.boss.hp-=1;this.boss.hitFlash=.1;g.shake=2}
      p.atkCd=.4;
    } else if(tool.at==='melee'){
      const bx=this.boss.x,by=this.boss.type==='lochness'?this.boss.swoopY:this.boss.y;
      if(Math.hypot(bx-px,by-py)<80+charge*20){this.boss.hp-=dmg;g.shake=4;this.boss.hitFlash=.15;this.hitFx.push({x:bx,y:by,t:0,color:'#ff5cf4'});for(let i=0;i<8;i++)g.addPart(bx,by,'#ff5cf4',.45,3,rand(-40,40),rand(-30,10))}
      p.atkCd=.3;
    } else {
      // Ranged projectile — fires in aim direction
      this.pProj.push({x:px,y:py,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:2.5,dmg,color:col,type:tool.at,charged:charge>.5,sz:charge>.5?8+charge*4:5});
      p.atkCd=charge>.5?.5:.3;
      for(let i=0;i<4;i++)g.addPart(px,py,col,.3,2,rand(-15,15),rand(-15,5));
    }
  }

  drawBoss(ctx){

// ========== STREAK ==========
class StrkSys{constructor(g){this.g=g;this.lt=0;this.slow=0;this.sh30=false}update(dt){const p=this.g.world.player;this.lt+=dt;if(this.lt>5){if(p.streak>0)p.streak=Math.max(0,p.streak-dt*2)}if(this.slow>0)this.slow-=dt}onClimb(){const g=this.g,p=g.world.player;this.lt=0;p.streak+=1;if(p.streak>g.profile.stats.longestStreak)g.profile.stats.longestStreak=Math.floor(p.streak);if(p.streak>=10&&p.streak<11){const w=g.world.sideData[p.side].windows.filter(w=>w.floor===p.floor&&!w.open);if(w.length>0){w[0].open=true;g.addScore(25)}}if(p.streak>=20&&p.streak<21)this.slow=6;if(p.streak>=30&&!this.sh30){p.shield+=1;this.sh30=true}}hasSlow(){return this.slow>0}reset(){this.g.world.player.streak=0;this.lt=0;this.sh30=false}}

class CollSys{constructor(g){this.g=g}update(dt){const g=this.g,w=g.world;if(!w||w.bossActive)return;if(Math.random()<.02){const side=Math.floor(Math.random()*4),x=.15+Math.random()*.7;const r=Math.random();let type='coin';if(r>.65)type='gem';if(r>.9)type='star';if(g.curMap.name==='City'&&type==='coin')type='silver';w.collectibles.push({side,x,y:80+Math.random()*400,type,bob:Math.random()*Math.PI*2})}
  for(let i=w.collectibles.length-1;i>=0;i--){const c=w.collectibles[i];c.bob+=dt*4;c.y+=Math.sin(c.bob)*.8;if(c.y>H+40){w.collectibles.splice(i,1);continue}if(c.side===w.player.side){const px=g.getPX(),py=g.getPY(),cx=AL+c.x*AW;if(Math.abs(cx-px)<20&&Math.abs(c.y-py)<26){const vals={coin:[25,1,'#ffd84d',7],silver:[30,2,'#c0c8d8',8],gem:[50,2,'#5b3fd1',9],star:[100,3,'#ffd84d',12]};const[sc,em,col,pc]=vals[c.type]||vals.coin;g.addScore(sc);g.addEm(em);for(let j=0;j<pc;j++)g.addPart(cx,c.y,col,.55,3.5,rand(-55,55),rand(-45,-15));w.collectibles.splice(i,1)}}}}}

// ========== CARS ==========
class CarSys{constructor(g){this.g=g;this.st=1.5}update(dt){const g=this.g,w=g.world,p=w.player;if(!g.curMap.hasCars||w.bossActive)return;
  // Clear all cars when player climbs above ground
  if(p.floor>2){w.cars=[];return}
  this.st-=dt;if(this.st<=0){this.st=rand(1,3);const fl=Math.random()<.5;const r=Math.random();let spd=80;if(r>.3)spd=140;if(r>.6)spd=220;if(r>.85)spd=300;w.cars.push({x:fl?-70:W+70,y:GROUND_Y-14,dir:fl?1:-1,speed:spd,w:50,sprite:pick(SP.cars),active:true,honked:false})}
  for(const car of w.cars){if(!car.active)continue;car.x+=car.dir*car.speed*dt;if((car.dir>0&&car.x>W+80)||(car.dir<0&&car.x<-80)){car.active=false;continue}
    if(!car.honked&&car.speed>200){if(Math.abs(car.x-g.getPX())<200){car.honked=true;g.addPart(car.x,car.y-20,'#ff4a4a',.8,2,0,-10)}}
    // Only hit player when on ground floor
    if(p.floor<=2&&p.side===0){const px=g.getPX();const carY=GROUND_Y-14;const playerY=g.getPY()+14;
      if(px+10>car.x-car.w/2&&px-10<car.x+car.w/2){if(playerY>=carY-18&&playerY<=carY+18){g.dmgPlayer(1,'car');car.active=false}}}}w.cars=w.cars.filter(c=>c.active)}}

// ========== RADIO SYSTEM (v20) ==========
class RadioSys{
  constructor(g){this.g=g;this.cd=0;this.active=false;this.hudEl=document.getElementById('radio-hud');this.nameEl=document.getElementById('radio-name');this.specBtn=document.getElementById('radio-special');this.togBtn=document.getElementById('radio-toggle');
    this.togBtn.onclick=()=>this.toggle();this.specBtn.onclick=()=>this.activateSpecial()}
  show(){if(this.hudEl)this.hudEl.style.display='flex'}
  hide(){if(this.hudEl)this.hudEl.style.display='none'}
  toggle(){this.active=!this.active;if(this.togBtn)this.togBtn.style.borderColor=this.active?'#ffd84d':'#5dc7ff';this.updateHUD()}
  updateHUD(){const p=this.g.world?.player;if(!p)return;const r=RADIOS[p.radio];
    if(this.nameEl)this.nameEl.textContent=p.radio+(this.active?' ON':' OFF');
    if(this.specBtn){const hasSpecial=r&&r.special;this.specBtn.disabled=!hasSpecial||this.cd>0;this.specBtn.style.color=hasSpecial?'#ffd84d':'#666';this.specBtn.style.borderColor=hasSpecial?'#ffd84d':'#444'}}
  update(dt){if(this.cd>0)this.cd-=dt;this.updateHUD()}
  activateSpecial(){const g=this.g,w=g.world,p=w.player;if(this.cd>0)return;const r=RADIOS[p.radio];if(!r||!r.special)return;
    if(r.special==='sandstorm'){// PUEBLO — destroys all debris
      w.fallObj.forEach(obj=>{if(obj.kind==='brick'||obj.kind==='crate'||obj.kind==='glass'||obj.kind==='tv'){obj.dead=true;for(let i=0;i<3;i++)g.addPart(obj.x,obj.y,'#c4a574',.3,2,rand(-20,20),rand(-10,10))}});
      g.shake=4;this.cd=15}
    else if(r.special==='frogHeal'){// MARSH — +2 HP, frog appears
      p.hp=Math.min(p.maxHp,p.hp+2);
      for(let i=0;i<10;i++)g.addPart(g.getPX(),g.getPY(),'#14d27a',.5,3,rand(-20,20),rand(-30,-5));
      // Spawn friendly frog visual
      w.effects.push({type:'frog',x:g.getPX(),y:g.getPY()-50,duration:2,bob:0});
      this.cd=20}
    else if(r.special==='electricFloat'){// CITY — float + slow enemies
      p.floating=true;p.floatingTimer=10;
      w.enemies.forEach(e=>{e.cd+=3});// Slow enemies by adding cooldown
      for(let i=0;i<8;i++)g.addPart(g.getPX(),g.getPY(),'#5dc7ff',.4,3,rand(-25,25),rand(-25,5));
      g.shake=3;this.cd=25}
  }
}

// ========== HUD (compact, not blocking floor) ==========
function mkHUD(g){const root=document.createElement('div');root.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:5;';
  const top=document.createElement('div');top.style.cssText='position:absolute;left:10px;right:10px;top:6px;display:flex;justify-content:space-between;gap:8px;';
  const tl=document.createElement('div');tl.style.cssText='background:rgba(12,8,30,.8);border:1px solid rgba(255,255,255,.1);padding:4px 8px;border-radius:6px;font-size:11px;font-family:"Courier New",monospace;';
  const tr=document.createElement('div');tr.style.cssText='background:rgba(12,8,30,.8);border:1px solid rgba(255,255,255,.1);padding:4px 8px;border-radius:6px;font-size:11px;font-family:"Courier New",monospace;text-align:right;';
  top.appendChild(tl);top.appendChild(tr);root.appendChild(top);
  document.getElementById('game-root').appendChild(root);
  return{show(){root.style.display='block'},hide(){root.style.display='none'},update(){if(!g.world)return;const p=g.world.player,m=g.curMap;
    tl.innerHTML='<span style="color:#ff6b6b">\u2665</span>'+'\u2665'.repeat(Math.max(0,p.hp))+'\u2661'.repeat(Math.max(0,p.maxHp-p.hp))+' <span style="color:#ffd84d">\u2605</span>'+p.score+' <span style="color:#14d27a">\u25c6</span>'+g.profile.emeralds;
    tr.innerHTML='<span style="color:#5dc7ff">F</span>'+(p.floor+1)+'/'+m.floors+(g.world.bossActive?' <span style="color:#ff6b6b">\u2694BOSS</span>':'')+(p.charging?' <span style="color:#ffd84d">CHARGING</span>':'');}}}

  render(){const ctx=this.ctx;ctx.imageSmoothingEnabled=false;ctx.clearRect(0,0,this.width,this.height);const sx=this.settings.shake?rand(-this.shake,this.shake):0,sy=this.settings.shake?rand(-this.shake,this.shake):0;ctx.save();ctx.translate(Math.floor(sx),Math.floor(sy));if(this.state==='vs-battle'){this.renderVS(ctx);this.drawParts(ctx);ctx.restore();return}this.drawBg(ctx);if(this.world){if(!this.world.bossActive){this.drawGround(ctx);this.drawBuilding(ctx);this.drawWindows(ctx);this.drawLadders(ctx);this.drawEnemies(ctx);this.drawFallObj(ctx);this.drawColl(ctx);this.drawCars(ctx)}else{this.drawBossArena(ctx)}if(this.bossSys)this.bossSys.drawBoss(ctx);this.drawPlayer(ctx);if(this.bossSys)this.bossSys.drawAimLine(ctx);this.drawParts(ctx);this.drawFG(ctx)}ctx.restore();if(this.flash>0){ctx.save();ctx.globalAlpha=this.flash*.7;ctx.fillStyle='#fff';ctx.fillRect(0,0,this.width,this.height);ctx.restore()}}

  drawLadders(ctx){const w=this.world,p=w.player;for(const l of w.ladders){if(l.side!==p.side)continue;const lx=AL+l.x*AW,ly1=this.getFloorY(l.floor+1)+4,ly2=this.getFloorY(l.floor)+4;if(ly2>this.height+20||ly1<-20)continue;ctx.globalAlpha=l.destroyed?Math.max(0,l.fade):1;const cols={Basic:'#d4a848',Steel:'#c0c8d8',Magnetic:'#14d27a',Spring:'#ff7ae7',Quantum:'#8efcff',Plasma:'#b14cff',Crystal:'#ffd84d',Ghost:'#8efcff',Vine:'#14d27a'};const col=cols[l.type]||'#d4a848';if(l.type==='Ghost'||l.type==='Quantum')ctx.globalAlpha*=.5+Math.sin(l.phase)*.3;

    if(dist<56&&cpu.atkCooldown<=0){const r=Math.random();if(r<.45)cin.attack=true;else if(r<.6){cin.attack=true;cin.down=true}else if(r<.7){cin.attack=true;cin.jump=true}}
    if(dist<175&&cpu.specialCooldown<=0&&cpu.teleportCD<=0&&cpu.blastCooldown<=0&&Math.random()<.2)cin.special=true;}
  if(p1)p1.update(dt,this,cpu,hin);if(cpu)cpu.update(dt,this,p1,cin);for(let i=this.vsProj.length-1;i>=0;i--){const p=this.vsProj[i];p.x+=p.vx*dt;if(p.big){p.vy=(p.vy||0)+300*dt;p.y+=p.vy*dt}p.life-=dt;for(const f of this.vsFighters){if(f.id===p.owner||f.dead)continue;if(Math.abs(p.x-f.x)<26&&Math.abs(p.y-f.y)<36){f.hurt(p.x,p.kb||14,.6,p.dmg||8,this);this.addPart(f.x,f.y-20,'#14d27a',.4,4,rand(-30,20),rand(-30,-10));p.life=0;break}}if(p.x<-30||p.x>W+30||p.life<=0)this.vsProj.splice(i,1)}if(this.vsFighters.some(f=>f.dead)&&!this._vsEnding){this._vsEnding=true;this.vsWinner=this.vsFighters.find(f=>!f.dead);setTimeout(()=>this.showVSResult(),1800)}};
Game.prototype.renderVS=function(ctx){if(this.state!=='vs-battle')return;const s=VSSTAGES[this.vsStage];
  const bg=s.img?LS(s.img):null;
  if(bg&&bg._l&&!bg._f){ctx.drawImage(bg,0,0,W,H);ctx.fillStyle='rgba(8,6,24,.42)';ctx.fillRect(0,0,W,H)}
  else{const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,s.sky);grad.addColorStop(1,s.ground);ctx.fillStyle=grad;ctx.fillRect(0,0,W,H)}
  // floor + platforms
  ctx.fillStyle=s.ground;ctx.fillRect(0,H-40,W,40);ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(0,H-40,W,2);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,H-38,W,3);
  for(let i=0;i<5;i++){ctx.fillStyle=s.color;ctx.fillRect(100+i*180,H-58,60,8);ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(100+i*180,H-50,60,2)}
  for(const p of this.vsProj){if(p.big){ctx.fillStyle='#c4a574';ctx.beginPath();ctx.arc(p.x,p.y,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8b6914';ctx.beginPath();ctx.arc(p.x,p.y,12,0,Math.PI*2);ctx.fill()}else{ctx.fillStyle='#14d27a';ctx.beginPath();ctx.arc(p.x,p.y,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8efcff';ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fill()}}
  for(const f of this.vsFighters)f.draw(ctx);
  // HUD: name + damage % + combo
  const p1=this.vsFighters[0],p2=this.vsFighters[1];
  const hud=(f,align)=>{ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(align==='left'?20:W-180,18,160,54);ctx.textAlign=align;const tx=align==='left'?30:W-30;ctx.font='bold 18px "Courier New",monospace';ctx.fillStyle=f.char.color;ctx.fillText(f.char.name,tx,40);ctx.font='bold 22px "Courier New",monospace';ctx.fillStyle=f.percent>=100?'#ff6b6b':'#fff';ctx.fillText(Math.floor(f.percent)+'%',tx,64);if(f.combo>=2){ctx.font='bold 13px "Courier New",monospace';ctx.fillStyle='#ffd84d';ctx.fillText(f.combo+' HIT!',tx,86)}};
  hud(p1,'left');hud(p2,'right');
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='11px "Courier New",monospace';ctx.textAlign='center';
  ctx.fillText('←→ move (dbl-tap dash)   ↑ jump   Z attack ( ↓Z heavy · ↑Z upper · air↓Z spike )   X special   hold back = block',W/2,H-12);ctx.textAlign='left'};
Game.prototype.showVSResult=function(){this.state='vs-result';const el=document.getElementById('vs-mode-screen');const w=this.vsWinner;el.classList.remove('hidden');el.innerHTML='<div class="panel center"><h1 class="title" style="font-size:36px;color:'+(w?w.char.color:'#ffd84d')+'">'+(w?'\u2605 '+w.char.name+' WINS!':'DRAW!')+'</h1><div style="font-size:18px;margin:20px 0;">P1: '+VSCHARACTERS[this.vsChar1].name+' - '+Math.floor(this.vsFighters[0].percent)+'%</div><div style="font-size:18px;">P2: '+VSCHARACTERS[this.vsChar2].name+' - '+Math.floor(this.vsFighters[1].percent)+'%</div><button class="dc-btn" id="vs-replay" style="margin-top:20px;">Rematch</button><button class="dc-btn secondary" id="vs-exit" style="margin-left:10px;">Exit</button></div>';document.getElementById('vs-replay').onclick=()=>this.startVSBattle();document.getElementById('vs-exit').onclick=()=>this.showMenu()};

const ALCHEMY_RPC = 'https://solana-devnet.g.alchemy.com/v2/nGo1YM4WFYFZ5ovur3aSf';
let web3Wallet = { connected: false, address: '', sol: 0 };

function initWalletHUD() {
  const btn = document.getElementById('wallet-connect');
  if (btn) {
    btn.onclick = connectGameWallet;
  }
}

async function connectGameWallet() {
  const btn = document.getElementById('wallet-connect');
  const solSpan = document.getElementById('wallet-sol');
  const hud = document.getElementById('wallet-hud');
  try {
    if (window.solana && window.solana.isPhantom) {
      const resp = await window.solana.connect();
      web3Wallet.connected = true;
      web3Wallet.address = resp.publicKey.toString();
      btn.textContent = '🔗 ' + web3Wallet.address.substring(0,6) + '...';
      btn.style.background = 'linear-gradient(135deg,#14f195,#00d68f)';
      
      // Get balance
      const balRes = await fetch(ALCHEMY_RPC, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({jsonrpc:'2.0',id:1,method:'getBalance',params:[web3Wallet.address]})
      });
      const balData = await balRes.json();
      web3Wallet.sol = balData.result ? balData.result.value / 1e9 : 0;
      solSpan.textContent = web3Wallet.sol.toFixed(3) + ' SOL';
      solSpan.style.display = 'inline';
    } else {
      alert('Install Phantom Wallet to play for real SOL!');
    }
  } catch(e) {
    console.error('Wallet error:', e);
  }
}
